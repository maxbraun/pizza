/* ------------------------------------------------------------------ *
 *  Dough calculator — three stages
 *  1. Ferment: yeast from a temperature/time "budget" (Q10); modified
 *     Gompertz rise curve coloured along a cold->warm axis
 *  2. Flour: protein -> W estimate, hydration range, ferment capacity;
 *     weak flour over-fermented visibly collapses
 *  3. Bake: oven temp -> bake time (exponential), crust-colour gauge,
 *     leoparding flag at the high-temp / short-time corner
 * ------------------------------------------------------------------ */

];

const TONE = { good: "#648A45", warn: "#C2641F", bad: "#C5362A" };
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

function tempColor(tempC) {
  const t = clamp((tempC - 2) / (35 - 2), 0, 1);
  const c1 = [61, 110, 120], c2 = [199, 125, 56];
  const ch = c1.map((a, i) => Math.round(a + (c2[i] - a) * t));
  return `rgb(${ch[0]}, ${ch[1]}, ${ch[2]})`;
}

// deterministic RNG so pictograms morph with settings, not reshuffle each render
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const CRUMB_PTS = (() => {
  const rnd = mulberry32(7), cols = 22, rows = 4, pts = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      pts.push({
        x: (c + 0.5) / cols + (rnd() - 0.5) * 0.05,
        y: (r + 0.5) / rows + (rnd() - 0.5) * 0.18,
        v: rnd(),
      });
  return pts;
})();
const TOPPINGS = (() => {
  const rnd = mulberry32(19), arr = [];
  for (let i = 0; i < 9; i++) {
    const ang = rnd() * Math.PI * 2, rad = 8 + rnd() * 34;
    arr.push({ kind: i % 3 === 0 ? "basil" : "mozz", ang, rad, s: 5 + rnd() * 5 });
  }
  return arr;
})();
const LEOPARD = (() => {
  const rnd = mulberry32(23), arr = [];
  for (let i = 0; i < 18; i++) arr.push({ ang: rnd() * Math.PI * 2, w: 4 + rnd() * 5, h: 3 + rnd() * 4 });
  return arr;
})();
const CRUST_STOPS = [[0, [232, 207, 158]], [0.45, [201, 138, 60]], [0.75, [154, 90, 34]], [1, [74, 42, 18]]];
function lerpStops(stops, t) {
  t = clamp(t, 0, 1);
  for (let i = 1; i < stops.length; i++) {
    if (t <= stops[i][0]) {
      const [p0, c0] = stops[i - 1], [p1, c1] = stops[i];
      const f = (t - p0) / (p1 - p0 || 1);
      const c = c0.map((a, k) => Math.round(a + (c1[k] - a) * f));
      return `rgb(${c[0]},${c[1]},${c[2]})`;
    }
  }
  const l = stops[stops.length - 1][1];
  return `rgb(${l[0]},${l[1]},${l[2]})`;
}

const SOURCES = [

    { t: "Acrylamide in bakery, snack & fried products", u: "https://pmc.ncbi.nlm.nih.gov/articles/PMC9749820/" },
    { t: "Glycerol monooleate → frozen dough quality", u: "https://www.ncbi.nlm.nih.gov/pmc/articles/PMC11765111/" },
    { t: "PizzaBlab — practitioner science (kneading, FDT, baking)", u: "https://www.pizzablab.com" },

];

// ---- flour-strength model -------------------------------------------
function flourProfile(protein, pl) {
  const W = clamp(Math.round((protein - 6) * 40), 60, 400);
  const category =
    protein < 10.5 ? "Soft / weak"
    : protein < 12 ? "Medium"
    : protein < 13.5 ? "Strong (pizza)"
    : "Very strong";
  const center = 55 + (protein - 9) * 2.833 + pl * 2; // elastic flours take a touch more water
  const hydrLo = Math.round(center - 4);
  const hydrHi = Math.round(center + 4);
  const maxHours = clamp(6 * Math.pow(2, (protein - 9) / 1.5), 8, 120);
  return { W, category, hydrLo, hydrHi, maxHours };
}

function hydrationVerdict(hydration, fp) {
  if (hydration > fp.hydrHi + 2)
    return { tone: "bad", text: `High for this flour — expect a slack, sticky dough that's hard to shape.` };
  if (hydration > fp.hydrHi)
    return { tone: "warn", text: `A touch wet; workable with confident handling.` };
  if (hydration < fp.hydrLo - 2)
    return { tone: "warn", text: `Drier than this flour can take — room for a more open crumb.` };
  return { tone: "good", text: `Well matched to a ${fp.hydrLo}–${fp.hydrHi}% range.` };
}

function fermentVerdict(hours, fp) {
  const m = Math.round(fp.maxHours);
  if (hours > fp.maxHours * 1.25)
    return { tone: "bad", text: `Too long (~${m} h max). Gluten breaks down — the dough slackens and over-proofs.` };
  if (hours > fp.maxHours)
    return { tone: "warn", text: `Near this flour's limit (~${m} h). Watch for over-proofing.` };
  return { tone: "good", text: `Comfortable — this flour holds up to ~${m} h here.` };
}

// ---- bake model ------------------------------------------------------
function bakeProfile(ovenC, hydration, salt, sugarPct, oilPct, surface) {
  const k = SURF[surface].k;
  let t = 116 * Math.exp(-0.0098 * ovenC);     // minutes, inverse-exponential
  t *= 1 + (hydration - 60) * 0.004;           // wetter sets a touch slower
  t *= 1.1 - 0.18 * k;                          // a better conductor sets the base faster
  t = clamp(t, 0.4, 30);
  let top = 100 / (1 + Math.exp(-(ovenC - 290) / 48));
  top += (salt - SALT_REF) * 4 + sugarPct * 5 + oilPct * 1.5; // residual sugar + added sugar/fat brown
  top = clamp(top, 3, 100);
  const base = clamp(top * (0.4 + 0.5 * k) + k * 22, 3, 100);  // surface drives base browning
  const leopard = ovenC >= 425 && t <= 2.2;
  const acryl = top >= 86 || base >= 90;        // very dark crust -> acrylamide rises
  const style =
    ovenC >= 430 ? "Neapolitan"
    : ovenC >= 340 ? "Artisan / high-heat"
    : ovenC >= 280 ? "New York"
    : ovenC >= 240 ? "Home oven"
    : "Low / pan";
  return { t, colour: top, base, leopard, acryl, style };
}

function digestScore(hours, tempC, leavening, preferment) {
  let d = 28 + 14 * Math.log2(Math.max(hours, 2) / 4);
  if (leavening === "sourdough") d += 22;       // LAB break down FODMAPs/fructans
  if (tempC <= 10) d += 8;                        // slow cold ferment = more breakdown
  if (preferment !== "straight") d += 8;
  return clamp(Math.round(d), 5, 99);
}
function digestVerdict(d) {
  if (d >= 68) return { tone: "good", text: `Easy on the gut (${d}/100) — long, slow fermentation breaks down more fructans.` };
  if (d >= 45) return { tone: "warn", text: `Moderate (${d}/100) — a longer or sourdough prove breaks down more.` };
  return { tone: "warn", text: `Short prove (${d}/100) — less FODMAP breakdown; extend the time for easier digestion.` };
}

function bakeVerdict(b, ovenC) {
  if (b.leopard)
    return { tone: "good", text: `Leoparding likely — fast bake, soft interior, charred spots. Needs a pizza or wood oven.` };
  if (ovenC >= 430)
    return { tone: "warn", text: `Very hot and quick, but only a dedicated pizza oven reaches this.` };
  if (ovenC >= 280)
    return { tone: "good", text: `Even golden crust with a crisp base — the classic range.` };
  if (ovenC >= 240)
    return { tone: "good", text: `Home-oven territory — golden and even; bake on a preheated steel or stone.` };
  return { tone: "warn", text: `Low — the crust can dry and stay pale before it browns. Preheat a steel hard.` };
}

function fmtBake(t) {
  if (t < 2) return `~${Math.round(t * 60)} s`;
  if (t < 6) return `~${t.toFixed(1)} min`;
  return `~${Math.round(t)} min`;
}
function crustLabel(c) {
  return c < 30 ? "Pale · light gold" : c < 55 ? "Golden" : c < 78 ? "Deep golden" : "Charred · leopard";
}

function compute({ tempC, hours, yeastType, doughWeight, hydration, salt, oilPct, sugarPct, leavening, preferment, starterStr }) {
  const rateFactor = Math.pow(Q10, (tempC - REF.tempC) / 10);
  const saltRate = Math.exp(-0.12 * (salt - SALT_REF)); // more salt -> slower yeast
  const flour = doughWeight / (1 + hydration / 100 + salt / 100 + oilPct / 100 + sugarPct / 100);
  const waterG = flour * (hydration / 100);
  const saltGrams = flour * (salt / 100);
  const oilGrams = flour * (oilPct / 100);
  const sugarGrams = flour * (sugarPct / 100);
  const pfYeast = preferment !== "straight" ? 0.85 : 1; // preferment carries some leavening
  let idyPct = 0, pct = 0, grams = 0, tsp = null, levainPct = 0, levainGrams = 0;
  if (leavening === "sourdough") {
    // anchored on ~15% levain → roughly 8 h at 24 °C; a vigorous starter needs less
    const strength = 0.7 + (starterStr / 100) * 0.6; // 0.7 sluggish .. 1.3 vigorous
    levainPct = clamp(150 / (hours * rateFactor * saltRate * strength), 3, 40);
    levainGrams = flour * (levainPct / 100);
  } else {
    idyPct = K / (hours * rateFactor * saltRate);
    pct = idyPct * TYPE[yeastType].mult * pfYeast;
    grams = flour * (pct / 100);
    const gPerTsp = TYPE[yeastType].gPerTsp;
    tsp = gPerTsp ? grams / gPerTsp : null;
  }
  return { rateFactor, saltRate, idyPct, pct, flour, grams, saltGrams, oilGrams, sugarGrams, tsp, waterG, levainPct, levainGrams };
}

// pure rise model — Gompertz values only, no pixels
function riseModel(tempC, hours, protein) {
  const lagFrac = clamp(0.12 + (25 - tempC) * 0.006, 0.08, 0.45);
  const lambda = hours * lagFrac;
  const span = Math.max(hours - lambda, 0.5);
  const Arise = 90 + (protein - 8) * 8;
  const mu = (Arise * 3.97) / (Math.E * span);
  const maxHours = clamp(6 * Math.pow(2, (protein - 9) / 1.5), 8, 120);
  const kd = clamp(2.0 / maxHours, 0.01, 0.2);
  const tMax = hours * 1.4;
  const riseAt = (t) => Arise * Math.exp(-Math.exp((mu * Math.E) / Arise * (lambda - t) + 1));
  const vAt = (t) => { let r = riseAt(t); if (t > maxHours) r *= Math.exp(-kd * (t - maxHours)); return 100 + r; };
  return { lambda, mu, Arise, maxHours, kd, tMax, collapses: maxHours < tMax, hours, vAt };
}
function proofQualityFn(hours, maxHours) {
  const over = clamp((hours - maxHours) / maxHours, 0, 1.5);
  return clamp(1 - over * 0.6, 0.25, 1);
}
function waterTempFn(ddt, roomTemp, mixMethod, preferment) {
  const friction = FRICTION[mixMethod].f;
  const nFactor = preferment !== "straight" ? 4 : 3; // preferment held at room temp -> 4-factor
  return { temp: clamp(Math.round(nFactor * ddt - (nFactor - 1) * roomTemp - friction), 0, 48), friction, nFactor };
}
function batchFn(doughWeight) {
  const balls = Math.max(1, Math.round(doughWeight / 250));
  return { balls, ballW: Math.round(doughWeight / balls) };
}
function geometryFn(hydration, protein, ovenC, proof, pl) {
  const openness = clamp((hydration - 50) / 25, 0, 1);
  const strength = clamp((protein - 8) / 7, 0, 1);
  const springFrac = clamp((ovenC - 230) / 240, 0, 1);
  const rimIndex = (20 + springFrac * 80 + strength * 24) * proof * (1 + pl * 0.12);
  return { openness, strength, springFrac, rimIndex };
}

// single pure entry point: inputs -> every derived value
function computeAll(inp) {
  const pl = (inp.plVal - 50) / 50;
  const r = compute(inp);
  const fp = flourProfile(inp.protein, pl);
  const rise = riseModel(inp.tempC, inp.hours, inp.protein);
  const proof = proofQualityFn(inp.hours, fp.maxHours);
  const bake = bakeProfile(inp.ovenC, inp.hydration, inp.salt, inp.sugarPct, inp.oilPct, inp.surface);
  const digest = digestScore(inp.hours, inp.tempC, inp.leavening, inp.preferment);
  const water = waterTempFn(inp.ddt, inp.roomTemp, inp.mixMethod, inp.preferment);
  const batch = batchFn(inp.doughWeight);
  const geometry = geometryFn(inp.hydration, inp.protein, inp.ovenC, proof, pl);
  const verdicts = {
    hydration: hydrationVerdict(inp.hydration, fp),
    ferment: fermentVerdict(inp.hours, fp),
    digestion: digestVerdict(digest),
    bake: bakeVerdict(bake, inp.ovenC),
  };
  return { r, fp, rise, proof, bake, digest, water, batch, geometry, verdicts, pl };
}

// view-only: turn a rise model into SVG path strings
function buildRisePaths(m, w, h, pad, vAxis) {
  const x = (t) => pad.l + (t / m.tMax) * (w - pad.l - pad.r);
  const y = (v) => h - pad.b - ((v - 100) / (vAxis - 100)) * (h - pad.t - pad.b);
  let line = "";
  for (let i = 0; i <= 120; i++) { const t = (i / 120) * m.tMax; line += (i ? "L" : "M") + x(t).toFixed(1) + " " + y(m.vAt(t)).toFixed(1) + " "; }
  const baselineY = h - pad.b;
  const area = line + `L${x(m.tMax).toFixed(1)} ${baselineY.toFixed(1)} L${pad.l.toFixed(1)} ${baselineY.toFixed(1)} Z`;
  return { line, area, target: { x: x(m.hours), y: y(m.vAt(m.hours)) }, lagX: x(m.lambda), baselineY };
}

// crumb cross-section drawn as a recognisable pizza edge: a thin base
// carrying sauce + cheese on the left, rising into a round cornicione bulb
// on the right with a full-height outer crust wall. Bulb height = oven
// spring × proof quality; pores open with hydration and inflate with heat;
// the elastic/extensible balance (pl) sets how tall-and-narrow vs wide the bulb is
function CrumbSlice({ hydration, protein, ovenC, base, proofQuality, pl }) {
  const VW = 520, VH = 172, inset = 8;
  const innerW = VW - inset * 2;
  const bottomY = VH - inset;
  const baseTh = 14;
  const yBaseTop = bottomY - baseTh;
  const o = clamp((hydration - 50) / 25, 0, 1);
  const s = clamp((protein - 8) / 7, 0, 1);
  const spring = clamp((ovenC - 230) / 240, 0, 1);
  let H = (20 + spring * 80 + s * 24) * proofQuality * (1 + pl * 0.12); // proof gates the spring; elastic springs taller

  const rimStartX = inset + innerW * (0.48 - pl * 0.03);
  const cxR = inset + innerW * (0.78 + pl * 0.03);
  const rightX = inset + innerW;
  let peakY = yBaseTop - H;
  peakY = Math.max(peakY, inset + 6);         // keep the dome inside the frame
  H = yBaseTop - peakY;
  const dx = cxR - rimStartX;
  const rad = (dx * dx + H * H) / (2 * Math.max(H, 1));   // circle through base-junction & peak
  const cyR = peakY + rad;
  const arcY = (x) => cyR - Math.sqrt(Math.max(rad * rad - (x - cxR) * (x - cxR), 0));
  const topY = (x) => (x <= rimStartX ? yBaseTop : arcY(x));
  const maxCol = bottomY - peakY;

  // silhouette
  const Narc = 40;
  let d = `M ${inset} ${bottomY} L ${inset} ${yBaseTop} L ${rimStartX.toFixed(1)} ${yBaseTop} `;
  for (let i = 1; i <= Narc; i++) {
    const x = rimStartX + (rightX - rimStartX) * (i / Narc);
    d += `L${x.toFixed(1)} ${arcY(x).toFixed(1)} `;
  }
  d += `L ${rightX.toFixed(1)} ${bottomY} Z`;

  // pores
  let poreBase = 2.2 + o * 6 + s * 1.2;
  let varAmt = 0.45 + o * 0.9;
  if (proofQuality < 0.7) { poreBase += 2.4; varAmt += 0.6; } // over-proofed -> coarse, merged
  const holes = CRUMB_PTS.map((p) => {
    const x = inset + p.x * innerW, ty = topY(x), colH = bottomY - ty;
    const hf = clamp(colH / maxCol, 0.2, 1);
    const py = 0.18 + p.y * 0.64;
    // oven heat expands the trapped gas (oven spring), inflating bubbles —
    // strongest in the rim where the gluten is most extensible
    const gas = (1 + spring * 0.55 * hf) * (0.6 + 0.4 * proofQuality);
    let r = poreBase * (0.5 + 1.25 * hf) * gas * (0.5 + varAmt * p.v);
    r = clamp(r, 0.7, Math.min(py, 1 - py) * colH * 0.92);
    return { x, y: ty + py * colH, r };
  });

  const crustCol = lerpStops(CRUST_STOPS, base / 100);
  // toppings sit on the base only (left of the rim)
  const sauceL = inset + 5, sauceR = rimStartX - 6;
  const cheese = [0.16, 0.3, 0.44].map((f) => inset + innerW * f);
  const charredBase = base >= 70;

  return (
    <svg className="fc-crumb" viewBox={`0 0 ${VW} ${VH}`} role="img" aria-label="Pizza edge cross-section">
      <clipPath id="crumbclip"><path d={d} /></clipPath>
      <path d={d} fill="#ead9b8" />
      <g clipPath="url(#crumbclip)">
        {holes.map((h, i) => (
          <circle key={i} cx={h.x} cy={h.y} r={h.r} fill="#f4eee2" stroke="#d6c094" strokeWidth="0.7" />
        ))}
      </g>
      {/* sauce + cheese on the base */}
      <path d={`M ${sauceL} ${yBaseTop - 1} L ${sauceR} ${yBaseTop - 1}`} stroke="#b23a26" strokeWidth="7" strokeLinecap="round" />
      {cheese.map((cx, i) => (
        <ellipse key={i} cx={cx} cy={yBaseTop - 6} rx="11" ry="5" fill="#f0e6cf" opacity="0.92" />
      ))}
      {/* crust skin */}
      <path d={d} fill="none" stroke={crustCol} strokeWidth="3.5" strokeLinejoin="round" />
      {/* charred underside spots when the base browns hard */}
      {charredBase && LEOPARD.slice(0, 6).map((l, i) => (
        <ellipse key={i} cx={inset + innerW * (0.12 + i * 0.13)} cy={bottomY - 1}
          rx={3 + l.w * 0.4} ry="2.4" fill="#33200f" opacity={clamp((base - 70) / 30, 0.2, 0.85)} />
      ))}
    </svg>
  );
}

// top-down pizza: cornicione browning from the bake, rim puff from protein
// × proof quality, char spots only when leoparding (high heat + short bake)
function Pizza({ colour, leopard, protein, proofQuality }) {
  const cx = 100, cy = 100, R = 92;
  const s = clamp((protein - 8) / 7, 0, 1);
  const rim = (11 + s * 9) * (0.5 + 0.5 * proofQuality);
  const sauceR = R - rim;
  const crust = lerpStops(CRUST_STOPS, colour / 100);
  return (
    <svg className="fc-pizza" viewBox="0 0 200 200" role="img" aria-label="Predicted pizza">
      <circle cx={cx} cy={cy} r={R} fill={crust} />
      <circle cx={cx} cy={cy} r={sauceR} fill="#b23a26" />
      <circle cx={cx} cy={cy} r={sauceR} fill="none" stroke="#8f2c1c" strokeWidth="1.5" />
      {TOPPINGS.map((t, i) => {
        const rad = Math.min(t.rad, sauceR - 9);
        const x = cx + Math.cos(t.ang) * rad, y = cy + Math.sin(t.ang) * rad;
        return t.kind === "mozz" ? (
          <circle key={i} cx={x} cy={y} r={t.s} fill="#f4ecd8" opacity="0.95" />
        ) : (
          <ellipse key={i} cx={x} cy={y} rx={t.s * 0.85} ry={t.s * 0.45}
            fill="#557a36" transform={`rotate(${(t.ang * 57) % 180},${x},${y})`} />
        );
      })}
      {leopard && LEOPARD.map((l, i) => {
        const rr = R - rim / 2;
        const x = cx + Math.cos(l.ang) * rr, y = cy + Math.sin(l.ang) * rr;
        return (
          <ellipse key={i} cx={x} cy={y} rx={l.w * 0.7} ry={l.h * 0.7}
            fill="#33200f" opacity="0.82" transform={`rotate(${l.ang * 57},${x},${y})`} />
        );
      })}
    </svg>
  );
}

      <div className="fc-wrap">
       <LearnCtx.Provider value={learn}>
        <div className="fc-top">
          <p className="fc-eyebrow">Ferment · flour · bake</p>
          <div className="fc-toggles">
            <button className="fc-nerd-toggle" data-on={learn} onClick={() => setLearn((v) => !v)}>Learn</button>
            <button className="fc-nerd-toggle" data-on={nerdMode} onClick={() => setNerdMode((v) => !v)}>Nerd mode</button>
          </div>
        </div>
        <h1 className="fc-title">From yeast to crust, <em>one dough modelled</em></h1>
        <p className="fc-lede">
          Three stages of pizza science in one place: how much yeast for your
          time and temperature, whether the flour can hold that ferment and
          hydration, and what the oven does to the crust. Colour tracks the
          driving variable at each step.{" "}
          {learn ? "Learn mode is on — explanations sit under each control." : "New here? Tap Learn for plain-English notes on every control."}
        </p>

        <div className="fc-presets">
          <span className="fc-preset-label">Style</span>
          {PIZZA_PRESETS.map((p) => (
            <button key={p.id} className="fc-chip" data-on={presetMatches(p.set)} onClick={() => applyPreset(p.set)}>{p.label}</button>
          ))}
        </div>

        <div className="fc-grid">
          {/* ---- controls ---- */}
          <div className="fc-panel">
            <p className="fc-panel-head"><span>1 · Dough</span><span style={{ color: accent }}>{tempC} °C</span></p>

            <p className="fc-subhead first">Prove</p>
            <Slider label="Fermentation temperature" value={tempC} unit="°C"
              min={2} max={35} step={1} onChange={setTempC} accent={accent} />
            <Help>The biggest lever. Warmer makes the yeast work faster (so you need less of it); colder slows it right down and builds more flavour.</Help>
            <Slider label="Target time" value={hours} unit="h"
              min={2} max={96} step={1} onChange={setHours} accent={accent} />
            <Help>How long the dough rises before baking. Longer time means less yeast and a tastier, more digestible crust.</Help>

            <p className="fc-subhead">Flour</p>
            <Slider label="Flour protein" value={protein} unit="%"
              min={8} max={15} step={0.5} onChange={setProtein} accent={accent}
              note={`≈ W ${fp.W} · ${fp.category}`} />
            <Help>Protein becomes gluten — the web that traps gas. More of it = a stronger dough that holds bigger bubbles and more water, but resists stretching. ~12–13% suits pizza. (W is the bakery measure of the same thing.)</Help>
            <Slider label="Extensible ↔ elastic (P/L)" value={plVal} unit=""
              min={0} max={100} step={1} onChange={setPlVal} accent={accent}
              note={pl < -0.2 ? "extensible — opens easily, spreads" : pl > 0.2 ? "elastic — springs back, taller rim" : "balanced"} />
            <Help>Two flours can have the same protein but behave differently: extensible dough stretches and stays put; elastic dough pings back. It shifts how easily the base opens and how tall the rim sits.</Help>
            <Slider label="Hydration" value={hydration} unit="%"
              min={50} max={85} step={1} onChange={setHydration} accent={accent}
              note={`recommended ${fp.hydrLo}–${fp.hydrHi}% for this flour`}
              noteColor={TONE[hVerdict.tone]} />
            <Help>Water as a percentage of flour. More water = a lighter, more open crumb — but a wetter, stickier dough that's harder to handle and needs a stronger flour.</Help>
            <Slider label="Salt" value={salt} unit="%"
              min={0} max={4} step={0.1} onChange={setSalt} accent={accent}
              note={`${r.saltGrams.toFixed(1)} g · ${salt < 1.8 ? "fast ferment, looser dough" : salt > 3 ? "slow ferment, tighter dough" : "typical pizza range"}`} />
            <Help>Seasons the dough, but it also reins in the yeast and tightens the gluten. Too little and the dough over-proofs fast and bakes pale; ~2.5–3% is standard.</Help>

            <p className="fc-subhead">Mix-ins</p>
            <Slider label="Oil" value={oilPct} unit="%"
              min={0} max={6} step={0.5} onChange={setOilPct} accent={accent}
              note={oilPct === 0 ? "none — Neapolitan style" : `${r.oilGrams.toFixed(0)} g — softer, crispier crust`} />
            <Help>Fat softens the crumb and crisps the crust. Common in New York and pan pizzas; a true Neapolitan uses none.</Help>
            <Slider label="Sugar" value={sugarPct} unit="%"
              min={0} max={4} step={0.25} onChange={setSugarPct} accent={accent}
              note={sugarPct === 0 ? "none" : `${r.sugarGrams.toFixed(0)} g — feeds browning`} />
            <Help>Feeds the yeast and, more importantly, helps the crust brown — useful when a home oven can't get hot enough to colour it on its own.</Help>

            <p className="fc-subhead">Leaven</p>
            <div className="fc-field">
              <div className="fc-field-head"><span className="fc-label">Leavening</span></div>
              <div className="fc-seg">
                {[["commercial", "Commercial"], ["sourdough", "Sourdough"]].map(([k, l]) => (
                  <button key={k} data-on={leavening === k} onClick={() => setLeavening(k)}>{l}</button>
                ))}
              </div>
            </div>
            <Help>What makes the dough rise. Commercial yeast is fast and predictable; sourdough (a live flour-and-water culture) is slower, tangier and gentler on the gut.</Help>
            {sourdough && (
              <>
                <Slider label="Starter strength" value={starterStr} unit=""
                  min={0} max={100} step={1} onChange={setStarterStr} accent={accent}
                  note={starterStr < 35 ? "sluggish — needs more levain" : starterStr > 65 ? "vigorous — needs less" : "average activity"} />
                <Help>How lively your starter is. A vigorous, recently-fed starter raises dough faster, so you need less of it.</Help>
                <p className="fc-note-line" style={{ color: CONF.i }}>
                  Levain % is a rule of thumb — your starter's real ripeness and activity dominate.
                </p>
              </>
            )}
            {!sourdough && (
              <>
                <div className="fc-field">
                  <div className="fc-field-head"><span className="fc-label">Yeast type</span></div>
                  <div className="fc-seg">
                    {Object.entries(TYPE).map(([k, v]) => (
                      <button key={k} data-on={yeastType === k} onClick={() => setYeastType(k)}>{v.label}</button>
                    ))}
                  </div>
                </div>
                <Help>The same yeast in three forms. Instant and active-dry come in jars; fresh is the cake from the fridge. The tool converts the amounts between them.</Help>
              </>
            )}
            <div className="fc-field">
              <div className="fc-field-head"><span className="fc-label">Preferment</span></div>
              <div className="fc-seg">
                {[["straight", "Straight"], ["poolish", "Poolish"], ["biga", "Biga"]].map(([k, l]) => (
                  <button key={k} data-on={preferment === k} onClick={() => setPreferment(k)}>{l}</button>
                ))}
              </div>
            </div>
            <Help>"Straight" mixes everything at once. A poolish (wet) or biga (stiff) is a bit of dough fermented the night before, then mixed in — more flavour and strength for a little planning.</Help>

            <p className="fc-subhead">Mixing & batch</p>
            <Slider label="Room temperature" value={roomTemp} unit="°C"
              min={12} max={30} step={1} onChange={setRoomTemp} accent={accent} />
            <Help>How warm your kitchen is. It's used to work out the water temperature so the dough finishes mixing at your target.</Help>
            <Slider label="Target dough temp (FDT)" value={ddt} unit="°C"
              min={20} max={28} step={0.5} onChange={setDdt} accent={accent}
              note={`use water at ~${waterTempReco} °C${waterTempReco <= 4 ? " (iced)" : ""}`} />
            <Help>The temperature you want the dough to be right after mixing (~24 °C is a good default). The tool tells you what temperature water to use to land there.</Help>
            <div className="fc-field">
              <div className="fc-field-head"><span className="fc-label">Mixing method</span></div>
              <div className="fc-seg">

                  <button key={k} data-on={mixMethod === k} onClick={() => setMixMethod(k)}>{v.label}</button>
                ))}
              </div>
            </div>
            <Help>Mixing adds heat through friction — a machine adds more than your hands — so a mixer or processor needs cooler water to hit the same dough temperature.</Help>
            <div className="fc-field">
              <div className="fc-field-head"><span className="fc-label">Total dough weight</span></div>
              <div className="fc-stepper">
                <button onClick={() => setDoughWeight((w) => Math.max(200, w - 100))}>−</button>
                <span className="fc-step-val">{doughWeight} g</span>
                <button onClick={() => setDoughWeight((w) => Math.min(4000, w + 100))}>+</button>
              </div>
            </div>
            <Help>Total dough you want to make. It's split into ~250 g balls — one good-sized pizza each.</Help>
          </div>

          {/* ---- ferment output ---- */}
          <div className="fc-panel">
            <p className="fc-panel-head"><span>{sourdough ? "Starter required" : "Yeast required"}</span><span>{sourdough ? "Sourdough" : TYPE[yeastType].label}</span></p>

            <div className="fc-readout">
              <span className="fc-big" style={{ color: accent }}>{sourdough ? r.levainGrams.toFixed(0) : gramsTxt}</span>
              <span className="fc-big-unit">{sourdough ? `g starter` : "grams"}</span>
            </div>
            <p className="fc-sub">

                : `${r.pct.toFixed(3)}% of flour (${Math.round(r.flour)} g) · ${r.saltGrams.toFixed(1)} g salt`}

            <svg className="fc-svg" viewBox={`0 0 ${W} ${H}`} role="img" aria-label="Predicted dough rise over time">

        </div>

        <div className="fc-panel fc-recipe">
          <p className="fc-panel-head"><span>The recipe</span><span style={{ color: accent }}>{balls} × {ballW} g</span></p>
          <div className="fc-recipe-grid">
            <div>
              <p className="fc-src-label">Ingredients</p>
              <ul className="fc-ing">
                <li><span className="nm">Flour<small>{fp.category}, ~{protein}%</small></span><span className="amt">{Math.round(r.flour)} g</span></li>
                <li><span className="nm">Water<small>{hydration}% · ~{waterTempReco} °C</small></span><span className="amt">{Math.round(waterTotal)} g</span></li>
                <li><span className="nm">Salt<small>{salt}%</small></span><span className="amt">{r.saltGrams.toFixed(1)} g</span></li>
                {oilPct > 0 && <li><span className="nm">Oil<small>{oilPct}%</small></span><span className="amt">{r.oilGrams.toFixed(0)} g</span></li>}
                {sugarPct > 0 && <li><span className="nm">Sugar<small>{sugarPct}%</small></span><span className="amt">{r.sugarGrams.toFixed(0)} g</span></li>}
                {sourdough
                  ? <li><span className="nm">Sourdough starter<small>{r.levainPct.toFixed(0)}% levain</small></span><span className="amt">{r.levainGrams.toFixed(0)} g</span></li>
                  : <li><span className="nm">Yeast<small>{yLabel.toLowerCase()}</small></span><span className="amt">{gramsTxt} g</span></li>}
              </ul>
              <p className="fc-recipe-yield">Makes {balls} ball{balls > 1 ? "s" : ""} · {doughWeight} g total</p>
            </div>
            <div>
              <p className="fc-src-label">Method</p>
              <ol className="fc-steps">
                {prefermentText && <li>{prefermentText}</li>}
                <li>
                  {sourdough
                    ? `Mix the active sourdough starter (${r.levainGrams.toFixed(0)} g) into the water (${Math.round(waterTotal)} g at ~${waterTempReco} °C), `
                    : `Whisk the ${yLabel.toLowerCase()} yeast (${gramsTxt} g) into the water (${Math.round(waterTotal)} g at ~${waterTempReco} °C), `}
                  add the flour ({Math.round(r.flour)} g), mix to a shaggy mass and rest 20 min.
                </li>
                <li>Add the salt ({r.saltGrams.toFixed(1)} g){oilPct > 0 ? ` and oil (${r.oilGrams.toFixed(0)} g)` : ""}{sugarPct > 0 ? ` and sugar (${r.sugarGrams.toFixed(0)} g)` : ""}, then {kneadText}</li>
                <li>Cover and bulk-rise until puffy, then divide into {balls} ball{balls > 1 ? "s" : ""} of ~{ballW} g{balls > 1 ? " each" : ""}.</li>
                <li>Prove {fermentLoc} for {hours} h.{coldNote}</li>
                {curve.collapses && (
                  <li>Heads up — at {protein}% protein this flour may over-ferment across {hours} h and slacken. A stronger flour or a shorter prove keeps the rim intact.</li>
                )}
                <li>Open each ball into a base, leaving a thicker rim, and top lightly so it bakes through.</li>
                <li>Preheat your {SURF[surface].label.toLowerCase()}{surface === "rack" ? "" : " (and oven)"} to {ovenC} °C. Bake ~{fmtBake(bake.t)}{bakeFinish}</li>
              </ol>
              {recipeTip && <p className="fc-recipe-tip">{recipeTip}</p>}
            </div>
          </div>
        </div>

        {nerdMode && (
          <div className="fc-panel fc-nerd">
            <p className="fc-panel-head"><span>Nerd mode · all values</span><span>live</span></p>
            <div className="fc-conf-legend">
              <span><i style={{ background: CONF.g }} /> grounded</span>
              <span><i style={{ background: CONF.h }} /> calibrated heuristic</span>
              <span><i style={{ background: CONF.i }} /> illustrative</span>
            </div>
            <div className="fc-nerd-grid">
              <div className="fc-nerd-col">
                <p className="fc-src-label">Leaven</p>
                <NRow k="Q₁₀ rate factor" v={`${r.rateFactor.toFixed(3)}×`} t="g" />
                <NRow k="salt slowing factor" v={`${r.saltRate.toFixed(3)}×`} t="h" />
                <NRow k="mode" v={sourdough ? "sourdough" : "commercial"} />
                {sourdough
                  ? <>
                      <NRow k="starter strength" v={`${starterStr}/100`} t="i" />
                      <NRow k="levain %" v={`${r.levainPct.toFixed(1)}%`} t="i" />
                      <NRow k="starter" v={`${r.levainGrams.toFixed(0)} g`} t="i" />
                    </>
                  : <>
                      <NRow k="base IDY %" v={`${r.idyPct.toFixed(3)}%`} t="g" />
                      <NRow k="yeast type mult" v={`${TYPE[yeastType].mult}×`} t="g" />
                      <NRow k="effective yeast %" v={`${r.pct.toFixed(3)}%`} t="g" />
                      <NRow k="yeast" v={`${r.grams.toFixed(2)} g`} t="g" />
                      <NRow k="yeast (tsp)" v={r.tsp != null ? `${r.tsp.toFixed(2)} tsp` : "—"} t="g" />
                    </>}
                <NRow k="preferment" v={preferment} t="i" />
                <NRow k="digestibility" v={`${digest} / 100`} t="i" />
              </div>
              <div className="fc-nerd-col">
                <p className="fc-src-label">Recipe & mix</p>
                <NRow k="flour" v={`${r.flour.toFixed(0)} g`} t="g" />
                <NRow k="water" v={`${r.waterG.toFixed(0)} g`} t="g" />
                <NRow k="salt" v={`${r.saltGrams.toFixed(1)} g`} t="g" />
                <NRow k="oil" v={`${r.oilGrams.toFixed(1)} g`} t="g" />
                <NRow k="sugar" v={`${r.sugarGrams.toFixed(1)} g`} t="g" />
                <NRow k="total dough" v={`${doughWeight} g`} t="g" />
                <NRow k="room temp" v={`${roomTemp} °C`} t="g" />
                <NRow k="target dough temp" v={`${ddt} °C`} t="g" />
                <NRow k="friction factor" v={`+${friction} °C`} t="g" />
                <NRow k="→ water temp" v={`~${waterTempReco} °C`} t="g" />
              </div>
              <div className="fc-nerd-col">
                <p className="fc-src-label">Flour & rise</p>
                <NRow k="protein" v={`${protein}%`} t="g" />
                <NRow k="est. W" v={`${fp.W}`} t="h" />
                <NRow k="P/L balance" v={pl.toFixed(2)} t="i" />
                <NRow k="hydration window" v={`${fp.hydrLo}–${fp.hydrHi}%`} t="h" />
                <NRow k="ferment capacity" v={`~${Math.round(fp.maxHours)} h`} t="h" />
                <NRow k="proof quality" v={proofQuality.toFixed(2)} t="h" />
                <NRow k="Gompertz λ (lag)" v={`${curve.lambda.toFixed(2)} h`} t="h" />
                <NRow k="Gompertz μₘ" v={curve.mu.toFixed(2)} t="h" />
                <NRow k="peak rise A" v={`${curve.Arise.toFixed(0)}%`} t="h" />
                <NRow k="collapse decay k" v={curve.kd.toFixed(3)} t="h" />
              </div>
              <div className="fc-nerd-col">
                <p className="fc-src-label">Bake & geometry</p>
                <NRow k="oven" v={`${ovenC} °C`} t="g" />
                <NRow k="surface (k)" v={`${SURF[surface].label} · ${SURF[surface].k}`} t="h" />
                <NRow k="bake time" v={`${bake.t.toFixed(2)} min · ${Math.round(bake.t * 60)} s`} t="h" />
                <NRow k="crust top idx" v={`${bake.colour.toFixed(1)} / 100`} t="h" />
                <NRow k="crust base idx" v={`${bake.base.toFixed(1)} / 100`} t="h" />
                <NRow k="leoparding" v={bake.leopard ? "yes" : "no"} t="h" />
                <NRow k="acrylamide flag" v={bake.acryl ? "high" : "ok"} t="h" />
                <NRow k="style" v={bake.style} t="g" />
                <NRow k="oven-spring frac" v={springFrac.toFixed(2)} t="h" />
                <NRow k="rim spring index" v={rimIndex.toFixed(1)} t="i" />
              </div>
            </div>
            <p className="fc-subhead">Dependency graph</p>
            <p className="fc-src-note" style={{ marginTop: 0, marginBottom: 6 }}>
              How a setting becomes a number: inputs feed models feed outputs. Edge colour marks the
              confidence of what it feeds.
            </p>
            <DepGraph />
            <p className="fc-src-note">
              Dots mark confidence: grounded values are arithmetic or standard formulas; heuristics are
              calibrated guesses; illustrative ones build intuition, not precision. water °C =
              N·FDT − (N−1)·room − friction (N = 4 with a preferment, else 3). yeast% = 2.4 / (h ·
              Q₁₀^((T−21)/10) · e^(−0.12·(S−2.5))) · type. bake ≈ 116·e^(−0.0098·T) · surface.
            </p>
          </div>
        )}

        <p className="fc-foot">
          A teaching model, not a lab instrument. Yeast assumes one steady
          temperature (anchored on ~0.3% IDY → full proof in ~8 h at 21 °C,
          Q₁₀ = {Q10}). Flour W-value, hydration range and ferment capacity are
          simple heuristics from protein. Bake time follows an inverse-exponential
          fit and the crust gauge tracks heat — real ovens, stones, steels and
          toppings all shift it. Use it for intuition: doubling the time halves
          the yeast, stronger flour buys hydration and ferment length, and a
          hotter oven trades minutes for leopard spots.
        </p>

        <div className="fc-sources">
          <p className="fc-sources-head">Sources</p>
          {SOURCES.map((g) => (
            <div className="fc-src-group" key={g.group}>
              <p className="fc-src-label">{g.group}</p>
              <ul>
                {g.items.map((it, i) => (
                  <li key={i}>
                    <a href={it.u} target="_blank" rel="noopener noreferrer">{it.t}</a>
                  </li>
                ))}
              </ul>
            </div>
          ))}
          <p className="fc-src-note">
            Links open the study or resource. Peer-reviewed work is paraphrased
            in this tool's heuristics, not implemented from the original methods.
          </p>
        </div>
       </LearnCtx.Provider>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<FermentCalculator />);
  </script>
</body>
</html>
