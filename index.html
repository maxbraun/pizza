function tempColor(tempC) {
  const t = clamp((tempC - 2) / (35 - 2), 0, 1);
  const c1 = [61, 110, 120], c2 = [199, 125, 56];
  const ch = c1.map((a, i) => Math.round(a + (c2[i] - a) * t));
  return `rgb(${ch[0]}, ${ch[1]}, ${ch[2]})`;
}

// deterministic RNG so pictograms morph with settings, not reshuffle each render
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const CRUMB_PTS = (() => {
  const rnd = mulberry32(7), cols = 22, rows = 4, pts = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      pts.push({
        x: (c + 0.5) / cols + (rnd() - 0.5) * 0.05,
        y: (r + 0.5) / rows + (rnd() - 0.5) * 0.18,
        v: rnd(),
      });
  return pts;
})();
const TOPPINGS = (() => {
  const rnd = mulberry32(19), arr = [];
  for (let i = 0; i < 9; i++) {
    const ang = rnd() * Math.PI * 2, rad = 8 + rnd() * 34;
    arr.push({ kind: i % 3 === 0 ? "basil" : "mozz", ang, rad, s: 5 + rnd() * 5 });
  }
  return arr;
})();
const LEOPARD = (() => {
  const rnd = mulberry32(23), arr = [];
  for (let i = 0; i < 18; i++) arr.push({ ang: rnd() * Math.PI * 2, w: 4 + rnd() * 5, h: 3 + rnd() * 4 });
  return arr;
})();

function lerpStops(stops, t) {
  t = clamp(t, 0, 1);
  for (let i = 1; i < stops.length; i++) {
    if (t <= stops[i][0]) {
      const [p0, c0] = stops[i - 1], [p1, c1] = stops[i];
      const f = (t - p0) / (p1 - p0 || 1);
      const c = c0.map((a, k) => Math.round(a + (c1[k] - a) * f));
      return `rgb(${c[0]},${c[1]},${c[2]})`;
    }
  }
  const l = stops[stops.length - 1][1];
  return `rgb(${l[0]},${l[1]},${l[2]})`;
}

// ---- flour-strength model -------------------------------------------
function flourProfile(protein, pl) {
  const W = clamp(Math.round((protein - 6) * 40), 60, 400);
  const category =
    protein < 10.5 ? "Soft / weak"
    : protein < 12 ? "Medium"
    : protein < 13.5 ? "Strong (pizza)"
    : "Very strong";
  const categoryKey =
    protein < 10.5 ? "flour.soft"
    : protein < 12 ? "flour.medium"
    : protein < 13.5 ? "flour.strong"
    : "flour.veryStrong";
  const center = 55 + (protein - 9) * 2.833 + pl * 2; // elastic flours take a touch more water
  const hydrLo = Math.round(center - 4);
  const hydrHi = Math.round(center + 4);
  const maxHours = clamp(6 * Math.pow(2, (protein - 9) / 1.5), 8, 120);
  return { W, category, categoryKey, hydrLo, hydrHi, maxHours };
}

function hydrationVerdict(hydration, fp) {
  if (hydration > fp.hydrHi + 2) return { tone: "bad", code: "verdict.hydration.high", params: {} };
  if (hydration > fp.hydrHi) return { tone: "warn", code: "verdict.hydration.wet", params: {} };
  if (hydration < fp.hydrLo - 2) return { tone: "warn", code: "verdict.hydration.dry", params: {} };
  return { tone: "good", code: "verdict.hydration.good", params: { lo: fp.hydrLo, hi: fp.hydrHi } };
}

function fermentVerdict(hours, fp) {
  const m = Math.round(fp.maxHours);
  if (hours > fp.maxHours * 1.25) return { tone: "bad", code: "verdict.ferment.tooLong", params: { m } };
  if (hours > fp.maxHours) return { tone: "warn", code: "verdict.ferment.limit", params: { m } };
  return { tone: "good", code: "verdict.ferment.good", params: { m } };
}

function overProofRecommendations(inp, fp) {
  const raw = inp.hours / fp.maxHours;
  if (raw < 0.8) return null;
  const severity = raw >= 1.25 ? 'bad' : raw >= 1 ? 'warn' : 'caution';
  const labelCode = `overproof.${severity}`;
  const whyCode = raw >= 1 ? 'overproof.why.over' : 'overproof.why.near';
  const whyParams = raw >= 1
    ? { tempC: inp.tempC, protein: inp.protein, maxHours: Math.round(fp.maxHours) }
    : { maxHours: Math.round(fp.maxHours), headroom: Math.round(fp.maxHours - inp.hours) };
  const levers = [];
  if (inp.protein < 13)             levers.push({ kCode: 'overproof.lever.proteinKey',     vCode: 'overproof.lever.protein',     params: { val: inp.protein } });
  if (inp.tempC > 10)               levers.push({ kCode: 'overproof.lever.temperatureKey', vCode: 'overproof.lever.temperature', params: { val: inp.tempC } });
  if (inp.salt < 2.5)               levers.push({ kCode: 'overproof.lever.saltKey',        vCode: 'overproof.lever.salt',        params: { val: inp.salt } });
  levers.push(                       { kCode: 'overproof.lever.timeKey',         vCode: 'overproof.lever.time',        params: { val: Math.max(1, Math.round(inp.hours - fp.maxHours * 0.85)) } });
  if (inp.preferment === 'straight') levers.push({ kCode: 'overproof.lever.prefermentKey', vCode: 'overproof.lever.preferment',  params: {} });
  if (inp.hydration > 68)           levers.push({ kCode: 'overproof.lever.hydrationKey',   vCode: 'overproof.lever.hydration',   params: { val: inp.hydration } });
  return { raw, severity, labelCode, whyCode, whyParams, levers };
}

// ---- bake model ------------------------------------------------------
function bakeProfile(ovenC, hydration, salt, sugarPct, oilPct, surface) {
  const k = SURF[surface].k;
  let t = 116 * Math.exp(-0.0098 * ovenC);     // minutes, inverse-exponential
  t *= 1 + (hydration - 60) * 0.004;           // wetter sets a touch slower
  t *= 1.1 - 0.18 * k;                          // a better conductor sets the base faster
  t = clamp(t, 0.4, 30);
  let top = 100 / (1 + Math.exp(-(ovenC - 290) / 48));
  top += (salt - SALT_REF) * 4 + sugarPct * 5 + oilPct * 1.5; // residual sugar + added sugar/fat brown
  top = clamp(top, 3, 100);
  const base = clamp(top * (0.4 + 0.5 * k) + k * 22, 3, 100);  // surface drives base browning
  const leopard = ovenC >= 425 && t <= 2.2;
  const acryl = top >= 86 || base >= 90;        // very dark crust -> acrylamide rises
  const style =
    ovenC >= 430 ? "Neapolitan"
    : ovenC >= 340 ? "Artisan / high-heat"
    : ovenC >= 280 ? "New York"
    : ovenC >= 240 ? "Home oven"
    : "Low / pan";
  const styleKey =
    ovenC >= 430 ? "bakeStyle.neapolitan"
    : ovenC >= 340 ? "bakeStyle.artisan"
    : ovenC >= 280 ? "bakeStyle.ny"
    : ovenC >= 240 ? "bakeStyle.homeOven"
    : "bakeStyle.lowPan";
  return { t, colour: top, base, leopard, acryl, style, styleKey };
}

function digestScore(hours, tempC, leavening, preferment) {
  let d = 28 + 14 * Math.log2(Math.max(hours, 2) / 4);
  if (leavening === "sourdough") d += 22;       // LAB break down FODMAPs/fructans
  if (tempC <= 10) d += 8;                        // slow cold ferment = more breakdown
  if (preferment !== "straight") d += 8;
  return clamp(Math.round(d), 5, 99);
}
function digestVerdict(d) {
  if (d >= 68) return { tone: "good", code: "verdict.digest.easy", params: { d } };
  if (d >= 45) return { tone: "warn", code: "verdict.digest.moderate", params: { d } };
  return { tone: "warn", code: "verdict.digest.short", params: { d } };
}

function bakeVerdict(b, ovenC) {
  if (b.leopard) return { tone: "good", code: "verdict.bake.leopard", params: {} };
  if (ovenC >= 430) return { tone: "warn", code: "verdict.bake.veryHot", params: {} };
  if (ovenC >= 280) return { tone: "good", code: "verdict.bake.golden", params: {} };
  if (ovenC >= 240) return { tone: "good", code: "verdict.bake.homeOven", params: {} };
  return { tone: "warn", code: "verdict.bake.low", params: {} };
}

function fmtBake(t) {
  if (t < 2) return `~${Math.round(t * 60)} s`;
  if (t < 6) return `~${t.toFixed(1)} min`;
  return `~${Math.round(t)} min`;
}
function crustLabel(c) {
  return c < 30 ? "Pale · light gold" : c < 55 ? "Golden" : c < 78 ? "Deep golden" : "Charred · leopard";
}
function crustLabelKey(c) {
  return c < 30 ? "crust.pale" : c < 55 ? "crust.golden" : c < 78 ? "crust.deepGolden" : "crust.charred";
}

function compute({ tempC, hours, yeastType, doughWeight, hydration, salt, oilPct, sugarPct, leavening, preferment, starterStr }) {
  const rateFactor = Math.pow(Q10, (tempC - REF.tempC) / 10);
  const saltRate = Math.exp(-0.12 * (salt - SALT_REF)); // more salt -> slower yeast
  const flour = doughWeight / (1 + hydration / 100 + salt / 100 + oilPct / 100 + sugarPct / 100);
  const waterG = flour * (hydration / 100);
  const saltGrams = flour * (salt / 100);
  const oilGrams = flour * (oilPct / 100);
  const sugarGrams = flour * (sugarPct / 100);
  const pfYeast = preferment !== "straight" ? 0.85 : 1; // preferment carries some leavening
  let idyPct = 0, pct = 0, grams = 0, tsp = null, levainPct = 0, levainGrams = 0;
  if (leavening === "sourdough") {
    // anchored on ~15% levain → roughly 8 h at 24 °C; a vigorous starter needs less
    const strength = 0.7 + (starterStr / 100) * 0.6; // 0.7 sluggish .. 1.3 vigorous
    levainPct = clamp(150 / (hours * rateFactor * saltRate * strength), 3, 40);
    levainGrams = flour * (levainPct / 100);
  } else {
    idyPct = K / (hours * rateFactor * saltRate);
    pct = idyPct * TYPE[yeastType].mult * pfYeast;
    grams = flour * (pct / 100);
    const gPerTsp = TYPE[yeastType].gPerTsp;
    tsp = gPerTsp ? grams / gPerTsp : null;
  }
  return { rateFactor, saltRate, idyPct, pct, flour, grams, saltGrams, oilGrams, sugarGrams, tsp, waterG, levainPct, levainGrams };
}

// pure rise model — Gompertz values only, no pixels
function riseModel(tempC, hours, protein) {
  const lagFrac = clamp(0.12 + (25 - tempC) * 0.006, 0.08, 0.45);
  const lambda = hours * lagFrac;
  const span = Math.max(hours - lambda, 0.5);
  const Arise = 90 + (protein - 8) * 8;
  const mu = (Arise * 3.97) / (Math.E * span);
  const maxHours = clamp(6 * Math.pow(2, (protein - 9) / 1.5), 8, 120);
  const kd = clamp(2.0 / maxHours, 0.01, 0.2);
  const tMax = hours * 1.4;
  const riseAt = (t) => Arise * Math.exp(-Math.exp((mu * Math.E) / Arise * (lambda - t) + 1));
  const vAt = (t) => { let r = riseAt(t); if (t > maxHours) r *= Math.exp(-kd * (t - maxHours)); return 100 + r; };
  return { lambda, mu, Arise, maxHours, kd, tMax, collapses: maxHours < tMax, hours, vAt };
}
function proofQualityFn(hours, maxHours) {
  const over = clamp((hours - maxHours) / maxHours, 0, 1.5);
  return clamp(1 - over * 0.6, 0.25, 1);
}
function waterTempFn(ddt, roomTemp, mixMethod, preferment) {
  const friction = FRICTION[mixMethod].f;
  const nFactor = preferment !== "straight" ? 4 : 3; // preferment held at room temp -> 4-factor
  return { temp: clamp(Math.round(nFactor * ddt - (nFactor - 1) * roomTemp - friction), 0, 48), friction, nFactor };
}
function batchFn(doughWeight) {
  const balls = Math.max(1, Math.round(doughWeight / 250));
  return { balls, ballW: Math.round(doughWeight / balls) };
}
function geometryFn(hydration, protein, ovenC, proof, pl) {
  const openness = clamp((hydration - 50) / 25, 0, 1);
  const strength = clamp((protein - 8) / 7, 0, 1);
  const springFrac = clamp((ovenC - 230) / 240, 0, 1);
  const rimIndex = (20 + springFrac * 80 + strength * 24) * proof * (1 + pl * 0.12);
  return { openness, strength, springFrac, rimIndex };
}

// single pure entry point: inputs -> every derived value
function computeAll(inp) {
  const pl = (inp.plVal - 50) / 50;
  const r = compute(inp);
  const fp = flourProfile(inp.protein, pl);
  const rise = riseModel(inp.tempC, inp.hours, inp.protein);
  const proof = proofQualityFn(inp.hours, fp.maxHours);
  const bake = bakeProfile(inp.ovenC, inp.hydration, inp.salt, inp.sugarPct, inp.oilPct, inp.surface);
  const digest = digestScore(inp.hours, inp.tempC, inp.leavening, inp.preferment);
  const water = waterTempFn(inp.ddt, inp.roomTemp, inp.mixMethod, inp.preferment);
  const batch = batchFn(inp.doughWeight);
  const geometry = geometryFn(inp.hydration, inp.protein, inp.ovenC, proof, pl);
  const verdicts = {
    hydration: hydrationVerdict(inp.hydration, fp),
    ferment: fermentVerdict(inp.hours, fp),
    digestion: digestVerdict(digest),
    bake: bakeVerdict(bake, inp.ovenC),
  };
  return { r, fp, rise, proof, bake, digest, water, batch, geometry, verdicts, pl, overProof: overProofRecommendations(inp, fp) };
}

// view-only: turn a rise model into SVG path strings
function buildRisePaths(m, w, h, pad, vAxis) {
  const x = (t) => pad.l + (t / m.tMax) * (w - pad.l - pad.r);
  const y = (v) => h - pad.b - ((v - 100) / (vAxis - 100)) * (h - pad.t - pad.b);
  let line = "";
  for (let i = 0; i <= 120; i++) { const t = (i / 120) * m.tMax; line += (i ? "L" : "M") + x(t).toFixed(1) + " " + y(m.vAt(t)).toFixed(1) + " "; }
  const baselineY = h - pad.b;
  const area = line + `L${x(m.tMax).toFixed(1)} ${baselineY.toFixed(1)} L${pad.l.toFixed(1)} ${baselineY.toFixed(1)} Z`;
  return { line, area, target: { x: x(m.hours), y: y(m.vAt(m.hours)) }, lagX: x(m.lambda), baselineY };
}

function DepGraph() {
  const pos = {};
  GRAPH.cols.forEach((col, ci) => {
    const n = col.length;
    col.forEach((node, ri) => {
      pos[node[0]] = { x: DG.colX[ci], w: DG.colW[ci], cyc: DG.top + (ri + 0.5) * (DG.H - DG.top - 10) / n };
    });
  });
  const t = useT();
  const titles = [t('graph.inputs'), t('graph.models'), t('graph.outputs')];
  return (
    <svg className="fc-depgraph" viewBox={`0 0 ${DG.W} ${DG.H}`} role="img" aria-label="Dependency graph: inputs to models to outputs">
      {titles.map((t, i) => (
        <text key={t} x={DG.colX[i] + DG.colW[i] / 2} y={15} textAnchor="middle"
          fontFamily="'JetBrains Mono',monospace" fontSize="10" fill="#7A6A5B" letterSpacing="2">{t.toUpperCase()}</text>
      ))}
      {GRAPH.edges.map((e, i) => {
        const a = pos[e[0]], b = pos[e[1]];
        const sx = a.x + a.w, sy = a.cyc, tx = b.x, ty = b.cyc, mx = (sx + tx) / 2;
        return <path key={"e" + i} d={`M${sx} ${sy} C ${mx} ${sy} ${mx} ${ty} ${tx} ${ty}`}
          fill="none" stroke={CONF[e[2]]} strokeWidth="1.1" opacity="0.4" />;
      })}
      {GRAPH.cols.flatMap((col) => col.map((node) => {
        const p = pos[node[0]], tier = node[2], stroke = tier ? CONF[tier] : "#bfb29a";
        return (
          <g key={node[0]}>
            <rect x={p.x} y={p.cyc - DG.nodeH / 2} width={p.w} height={DG.nodeH} rx="6"
              fill="#F8F1E3" stroke={stroke} strokeWidth={tier ? 1.4 : 1} />
            {tier && <rect x={p.x} y={p.cyc - DG.nodeH / 2} width="3.5" height={DG.nodeH} rx="1.5" fill={CONF[tier]} />}
            <text x={p.x + p.w / 2} y={p.cyc + 3} textAnchor="middle"
              fontFamily="'JetBrains Mono',monospace" fontSize="8.6" fill="#231a12">{node[1]}</text>
          </g>
        );
      }))}
    </svg>
  );
}

// crumb cross-section drawn as a recognisable pizza edge: a thin base
// carrying sauce + cheese on the left, rising into a round cornicione bulb
// on the right with a full-height outer crust wall. Bulb height = oven
// spring × proof quality; pores open with hydration and inflate with heat;
// the elastic/extensible balance (pl) sets how tall-and-narrow vs wide the bulb is
function CrumbSlice({ hydration, protein, ovenC, base, proofQuality, pl }) {
  const VW = 520, VH = 172, inset = 8;
  const innerW = VW - inset * 2;
  const bottomY = VH - inset;
  const baseTh = 14;
  const yBaseTop = bottomY - baseTh;
  const o = clamp((hydration - 50) / 25, 0, 1);
  const s = clamp((protein - 8) / 7, 0, 1);
  const spring = clamp((ovenC - 230) / 240, 0, 1);
  let H = (20 + spring * 80 + s * 24) * proofQuality * (1 + pl * 0.12); // proof gates the spring; elastic springs taller

  const rimStartX = inset + innerW * (0.48 - pl * 0.03);
  const cxR = inset + innerW * (0.78 + pl * 0.03);
  const rightX = inset + innerW;
  let peakY = yBaseTop - H;
  peakY = Math.max(peakY, inset + 6);         // keep the dome inside the frame
  H = yBaseTop - peakY;
  const dx = cxR - rimStartX;
  const rad = (dx * dx + H * H) / (2 * Math.max(H, 1));   // circle through base-junction & peak
  const cyR = peakY + rad;
  const arcY = (x) => cyR - Math.sqrt(Math.max(rad * rad - (x - cxR) * (x - cxR), 0));
  const topY = (x) => (x <= rimStartX ? yBaseTop : arcY(x));
  const maxCol = bottomY - peakY;

  // silhouette
  const Narc = 40;
  let d = `M ${inset} ${bottomY} L ${inset} ${yBaseTop} L ${rimStartX.toFixed(1)} ${yBaseTop} `;
  for (let i = 1; i <= Narc; i++) {
    const x = rimStartX + (rightX - rimStartX) * (i / Narc);
    d += `L${x.toFixed(1)} ${arcY(x).toFixed(1)} `;
  }
  d += `L ${rightX.toFixed(1)} ${bottomY} Z`;

  // pores
  let poreBase = 2.2 + o * 6 + s * 1.2;
  let varAmt = 0.45 + o * 0.9;
  if (proofQuality < 0.7) { poreBase += 2.4; varAmt += 0.6; } // over-proofed -> coarse, merged
  const holes = CRUMB_PTS.map((p) => {
    const x = inset + p.x * innerW, ty = topY(x), colH = bottomY - ty;
    const hf = clamp(colH / maxCol, 0.2, 1);
    const py = 0.18 + p.y * 0.64;
    // oven heat expands the trapped gas (oven spring), inflating bubbles —
    // strongest in the rim where the gluten is most extensible
    const gas = (1 + spring * 0.55 * hf) * (0.6 + 0.4 * proofQuality);
    let r = poreBase * (0.5 + 1.25 * hf) * gas * (0.5 + varAmt * p.v);
    r = clamp(r, 0.7, Math.min(py, 1 - py) * colH * 0.92);
    return { x, y: ty + py * colH, r };
  });

  const crustCol = lerpStops(CRUST_STOPS, base / 100);
  // toppings sit on the base only (left of the rim)
  const sauceL = inset + 5, sauceR = rimStartX - 6;
  const cheese = [0.16, 0.3, 0.44].map((f) => inset + innerW * f);
  const charredBase = base >= 70;

  return (
    <svg className="fc-crumb" viewBox={`0 0 ${VW} ${VH}`} role="img" aria-label="Pizza edge cross-section">
      <clipPath id="crumbclip"><path d={d} /></clipPath>
      <path d={d} fill="#ead9b8" />
      <g clipPath="url(#crumbclip)">
        {holes.map((h, i) => (
          <circle key={i} cx={h.x} cy={h.y} r={h.r} fill="#f4eee2" stroke="#d6c094" strokeWidth="0.7" />
        ))}
      </g>
      {/* sauce + cheese on the base */}
      <path d={`M ${sauceL} ${yBaseTop - 1} L ${sauceR} ${yBaseTop - 1}`} stroke="#b23a26" strokeWidth="7" strokeLinecap="round" />
      {cheese.map((cx, i) => (
        <ellipse key={i} cx={cx} cy={yBaseTop - 6} rx="11" ry="5" fill="#f0e6cf" opacity="0.92" />
      ))}
      {/* crust skin */}
      <path d={d} fill="none" stroke={crustCol} strokeWidth="3.5" strokeLinejoin="round" />
      {/* charred underside spots when the base browns hard */}
      {charredBase && LEOPARD.slice(0, 6).map((l, i) => (
        <ellipse key={i} cx={inset + innerW * (0.12 + i * 0.13)} cy={bottomY - 1}
          rx={3 + l.w * 0.4} ry="2.4" fill="#33200f" opacity={clamp((base - 70) / 30, 0.2, 0.85)} />
      ))}
    </svg>
  );
}

// top-down pizza: cornicione browning from the bake, rim puff from protein
// × proof quality, char spots only when leoparding (high heat + short bake)
function Pizza({ colour, leopard, protein, proofQuality }) {
  const cx = 100, cy = 100, R = 92;
  const s = clamp((protein - 8) / 7, 0, 1);
  const rim = (11 + s * 9) * (0.5 + 0.5 * proofQuality);
  const sauceR = R - rim;
  const crust = lerpStops(CRUST_STOPS, colour / 100);
  return (
    <svg className="fc-pizza" viewBox="0 0 200 200" role="img" aria-label="Predicted pizza">
      <circle cx={cx} cy={cy} r={R} fill={crust} />
      <circle cx={cx} cy={cy} r={sauceR} fill="#b23a26" />
      <circle cx={cx} cy={cy} r={sauceR} fill="none" stroke="#8f2c1c" strokeWidth="1.5" />
      {TOPPINGS.map((t, i) => {
        const rad = Math.min(t.rad, sauceR - 9);
        const x = cx + Math.cos(t.ang) * rad, y = cy + Math.sin(t.ang) * rad;
        return t.kind === "mozz" ? (
          <circle key={i} cx={x} cy={y} r={t.s} fill="#f4ecd8" opacity="0.95" />
        ) : (
          <ellipse key={i} cx={x} cy={y} rx={t.s * 0.85} ry={t.s * 0.45}
            fill="#557a36" transform={`rotate(${(t.ang * 57) % 180},${x},${y})`} />
        );
      })}
      {leopard && LEOPARD.map((l, i) => {
        const rr = R - rim / 2;
        const x = cx + Math.cos(l.ang) * rr, y = cy + Math.sin(l.ang) * rr;
        return (
          <ellipse key={i} cx={x} cy={y} rx={l.w * 0.7} ry={l.h * 0.7}
            fill="#33200f" opacity="0.82" transform={`rotate(${l.ang * 57},${x},${y})`} />
        );
      })}
    </svg>
  );
}

                <Slider label={t('label.ddt')} value={ddt} unit="°C"
                  min={20} max={28} step={0.5} onChange={setDdt} accent={accent}
                  note={t('note.ddt', { temp: waterTempReco, icedNote: waterTempReco <= 4 ? t('note.ddt.iced') : '' })} />
                <Help>{t('help.ddt')}</Help>
                <div className="fc-field">
                  <div className="fc-field-head"><span className="fc-label">{t('label.mixMethod')}</span></div>
                  <div className="fc-seg">
                    {Object.keys(FRICTION).map(k => (
                      <button key={k} data-on={mixMethod === k} onClick={() => setMixMethod(k)}>{t('friction.' + k)}</button>
                    ))}
                  </div>
                </div>
                <Help>{t('help.mixMethod')}</Help>
              </>
            )}
            <div className="fc-field">
              <div className="fc-field-head"><span className="fc-label">{t('label.doughWeight')}</span></div>
              <div className="fc-stepper">
                <button onClick={() => setDoughWeight((w) => Math.max(200, w - 100))}>−</button>
                <span className="fc-step-val">{doughWeight} g</span>
                <button onClick={() => setDoughWeight((w) => Math.min(4000, w + 100))}>+</button>
              </div>
            </div>
            <Help>{t('help.doughWeight')}</Help>
          </div>

          {/* ---- ferment output ---- */}
          <div className="fc-panel">
            <p className="fc-panel-head"><span>{t(sourdough ? 'panel.starterRequired' : 'panel.yeastRequired')}</span><span>{t(sourdough ? 'leaven.sourdough' : 'yeast.' + yeastType)}</span></p>

            <div className="fc-readout">
              <span className="fc-big" style={{ color: accent }}>{sourdough ? r.levainGrams.toFixed(0) : gramsTxt}</span>
              <span className="fc-big-unit">{t(sourdough ? 'unit.gStarter' : 'unit.grams')}</span>
            </div>
            <p className="fc-sub">
              {sourdough
                ? t('yeast.levainSub', { levainPct: r.levainPct.toFixed(0), flourG: Math.round(r.flour), saltG: r.saltGrams.toFixed(1) })
                : t('yeast.commercialSub', { pct: r.pct.toFixed(3), flourG: Math.round(r.flour), saltG: r.saltGrams.toFixed(1) })}
              {!sourdough && r.tsp != null && t('yeast.tsp', { tsp: r.tsp.toFixed(2) })}
            </p>

            <div className="fc-fit">
              <StatusRow label={t('verdict.hydration')} verdict={hVerdict} />
              <StatusRow label={t('verdict.ferment')} verdict={fVerdict} />
              <StatusRow label={t('verdict.digest')} verdict={dVerdict} />
            </div>
            <Help>{t('help.verdicts')}</Help>

            <CapacityMeter hours={hours} maxHours={fp.maxHours} />
            <Help>{t('help.capacity')}</Help>
            <OverProofPanel op={M.overProof} />

            <svg className="fc-svg" viewBox={`0 0 ${W} ${H}`} role="img" aria-label="Predicted dough rise over time">
              <defs>
                <linearGradient id="fcfill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={accent} stopOpacity="0.22" />
                  <stop offset="100%" stopColor={accent} stopOpacity="0.01" />
                </linearGradient>
              </defs>
              <line x1={pad.l} y1={curve.baselineY} x2={W - pad.r} y2={curve.baselineY} stroke="#E4D4BA" strokeWidth="1" />
              <line x1={curve.lagX} y1={pad.t} x2={curve.lagX} y2={curve.baselineY} stroke="#E4D4BA" strokeWidth="1" strokeDasharray="2 4" />
              <path className="fc-area" d={curve.area} fill="url(#fcfill)" />
              <path className="fc-line" d={curve.line} fill="none" stroke={accent} strokeWidth="2.5" strokeLinecap="round" />
              <line className="fc-target-line" x1={curve.target.x} y1={pad.t} x2={curve.target.x} y2={curve.baselineY}
                    stroke={accent} strokeWidth="1.5" strokeDasharray="3 3" opacity="0.55" />
              <circle className="fc-target-dot" cx={curve.target.x} cy={curve.target.y} r="5.5"
                      fill="#f4eee2" stroke={accent} strokeWidth="2.5" />
              <text x={curve.target.x} y={pad.t - 7} textAnchor="middle"
                    fontFamily="'JetBrains Mono', monospace" fontSize="11" fill="#7A6A5B">{t('rise.target', { hours })}</text>
            </svg>

            <div className="fc-zones">
              <span style={{ width: `${(curve.lambda / curve.tMax) * 100}%` }}>{t('rise.lagLabel')}</span>
              <span style={{ flex: 1, textAlign: "center" }}>{t('rise.activeRise')}</span>
              <span>{t(curve.collapses ? 'rise.collapse' : 'rise.overProof')}</span>
            </div>
            <Help>{t('help.riseCurve')}</Help>

            <div className="fc-crumb-wrap">
              <span className="fc-stat-label">{t('crumb.label')}</span>
              <CrumbSlice hydration={hydration} protein={protein} ovenC={ovenC}
                base={bake.base} proofQuality={proofQuality} pl={pl} />
            </div>
            <Help>{t('help.crumb')}</Help>
          </div>
        </div>

        {/* ---- bake stage ---- */}
        <div className="fc-panel fc-bake">
          <p className="fc-panel-head"><span>{t('panel.bake')}</span><span className="fc-style-tip" data-tip={t('bakeStyle.tip')} style={{ color: EMBER }}>{t(bake.styleKey)}<span className="fc-style-i">ⓘ</span></span></p>
          <div className="fc-presets bake">
            <span className="fc-preset-label">{t('label.oven')}</span>
            {OVEN_PRESETS.map((p) => (
              <button key={p.id} className="fc-chip" data-on={presetMatches(p.set)} onClick={() => applyPreset(p.set)}>{t('ovenPreset.' + p.id)}</button>
            ))}
          </div>
          <div className="fc-bake-grid">
            <div>
              <Slider label={t('label.ovenTemp')} value={ovenC} unit="°C"
                min={200} max={500} step={5} onChange={setOvenC} accent={EMBER} />
              <Help>{t('help.ovenTemp')}</Help>
              <div className="fc-field">
                <div className="fc-field-head"><span className="fc-label">{t('label.bakingSurface')}</span></div>
                <div className="fc-seg">
                  {Object.keys(SURF).map(k => (
                    <button key={k} data-on={surface === k} onClick={() => setSurface(k)}>{t('surface.' + k)}</button>
                  ))}
                </div>
              </div>
              <Help>{t('help.bakingSurface')}</Help>
              <div className="fc-bake-stats">
                <div>
                  <span className="fc-stat-label">{t('bake.time')}</span>
                  <span className="fc-stat-val" style={{ color: EMBER }}>{fmtBake(bake.t)}</span>
                </div>
                <div>
                  <span className="fc-stat-label">{t('bake.topBase')}</span>
                  <span className="fc-stat-val small">{t(crustLabelKey(bake.colour))} / {t(crustLabelKey(bake.base))}</span>
                </div>
              </div>
              <p className="fc-formula">{t('bake.formula')}</p>
            </div>

            <div>
              <span className="fc-stat-label">{t('bake.yourPizza')}</span>
              <Pizza colour={bake.colour} leopard={bake.leopard} protein={protein} proofQuality={proofQuality} />
              <span className="fc-stat-label">{t('bake.crustColour')}</span>
              <div className="fc-gauge">
                <div className="fc-gauge-mark" style={{ left: `${bake.colour}%` }} />
              </div>
              <div className="fc-gauge-labels"><span>{t('gauge.pale')}</span><span>{t('gauge.golden')}</span><span>{t('gauge.charred')}</span></div>
              <div className="fc-bake-verdict">
                <StatusRow label={t('verdict.bake')} verdict={bVerdict} />
                {bake.acryl && (
                  <StatusRow label={t('verdict.caution')} verdict={{ tone: "bad", code: "verdict.bake.acrylamide", params: {} }} />
                )}
              </div>
            </div>
          </div>
        </div>

        <div className="fc-panel fc-recipe">
          <p className="fc-panel-head"><span>{t('panel.recipe')}</span><span style={{ color: accent }}>{balls} × {ballW} g</span></p>
          <div className="fc-recipe-grid">
            <div>
              <p className="fc-src-label">{t('recipe.ingredients')}</p>
              <ul className="fc-ing">
                <li><span className="nm">{t('recipe.flour')}<small>{t(fp.categoryKey)}, ~{protein}%</small></span><span className="amt">{Math.round(r.flour)} g</span></li>
                <li><span className="nm">{t('recipe.water')}<small>{hydration}% · ~{waterTempReco} °C</small></span><span className="amt">{Math.round(waterTotal)} g</span></li>
                <li><span className="nm">{t('recipe.salt')}<small>{salt}%</small></span><span className="amt">{r.saltGrams.toFixed(1)} g</span></li>
                {oilPct > 0 && <li><span className="nm">{t('recipe.oil')}<small>{oilPct}%</small></span><span className="amt">{r.oilGrams.toFixed(0)} g</span></li>}
                {sugarPct > 0 && <li><span className="nm">{t('recipe.sugar')}<small>{sugarPct}%</small></span><span className="amt">{r.sugarGrams.toFixed(0)} g</span></li>}
                {sourdough
                  ? <li><span className="nm">{t('recipe.sourdoughStarter')}<small>{t('recipe.levainPct', { pct: r.levainPct.toFixed(0) })}</small></span><span className="amt">{r.levainGrams.toFixed(0)} g</span></li>
                  : <li><span className="nm">{t('recipe.yeast')}<small>{t('yeast.' + yeastType)}</small></span><span className="amt">{gramsTxt} g</span></li>}
              </ul>
              <p className="fc-recipe-yield">{t('recipe.makes', { balls, suffix: ballSuffix, weight: doughWeight })}</p>
            </div>
            <div>
              <p className="fc-src-label">{t('recipe.method')}</p>
              <ol className="fc-steps">
                {prefermentText && <li>{prefermentText}</li>}
                <li>
                  {sourdough
                    ? t('recipe.step.mixSourdough', { levainG: r.levainGrams.toFixed(0), waterG: Math.round(waterTotal), waterTemp: waterTempReco, flourG: Math.round(r.flour) })
                    : t('recipe.step.mixYeast', { yeastLabel: t('yeast.' + yeastType), yeastG: gramsTxt, waterG: Math.round(waterTotal), waterTemp: waterTempReco, flourG: Math.round(r.flour) })}
                </li>
                <li>{t('recipe.step.addSalt', { saltG: r.saltGrams.toFixed(1), oilText: oilPct > 0 ? t('recipe.step.addOil', { oilG: r.oilGrams.toFixed(0) }) : '', sugarText: sugarPct > 0 ? t('recipe.step.addSugar', { sugarG: r.sugarGrams.toFixed(0) }) : '', kneadText })}</li>
                <li>{t('recipe.step.bulkRise', { balls, suffix: ballSuffix, ballW, eachText: balls > 1 ? t('recipe.each') : '' })}</li>
                <li>{t('recipe.step.prove', { fermentLoc, hours, coldNote })}</li>
                {curve.collapses && (
                  <li>{t('recipe.step.overFerment', { protein, hours })}</li>
                )}
                <li>{t('recipe.step.openBall')}</li>
                <li>{t('recipe.step.bake', { surface: t('surface.' + surface), ovenSuffix: surface === "rack" ? "" : t('recipe.step.bakeOvenSuffix'), ovenC, bakeTime: fmtBake(bake.t), bakeFinish })}</li>
              </ol>
              {recipeTip && <p className="fc-recipe-tip">{recipeTip}</p>}
            </div>
          </div>
        </div>

        {nerdMode && (
          <div className="fc-panel fc-nerd">
            <p className="fc-panel-head"><span>{t('panel.nerd')}</span><span>{t('panel.nerd.live')}</span></p>
            <div className="fc-conf-legend">
              <span><i style={{ background: CONF.g }} /> {t('nerd.confidence.grounded')}</span>
              <span><i style={{ background: CONF.h }} /> {t('nerd.confidence.heuristic')}</span>
              <span><i style={{ background: CONF.i }} /> {t('nerd.confidence.illustrative')}</span>
            </div>
            <div className="fc-nerd-grid">
              <div className="fc-nerd-col">
                <p className="fc-src-label">{t('nerd.col.leaven')}</p>
                <NRow k="Q₁₀ rate factor" v={`${r.rateFactor.toFixed(3)}×`} t="g" />
                <NRow k="salt slowing factor" v={`${r.saltRate.toFixed(3)}×`} t="h" />
                <NRow k="mode" v={sourdough ? "sourdough" : "commercial"} />
                {sourdough
                  ? <>
                      <NRow k="starter strength" v={`${starterStr}/100`} t="i" />
                      <NRow k="levain %" v={`${r.levainPct.toFixed(1)}%`} t="i" />
                      <NRow k="starter" v={`${r.levainGrams.toFixed(0)} g`} t="i" />
                    </>
                  : <>
                      <NRow k="base IDY %" v={`${r.idyPct.toFixed(3)}%`} t="g" />
                      <NRow k="yeast type mult" v={`${TYPE[yeastType].mult}×`} t="g" />
                      <NRow k="effective yeast %" v={`${r.pct.toFixed(3)}%`} t="g" />
                      <NRow k="yeast" v={`${r.grams.toFixed(2)} g`} t="g" />
                      <NRow k="yeast (tsp)" v={r.tsp != null ? `${r.tsp.toFixed(2)} tsp` : "—"} t="g" />
                    </>}
                <NRow k="preferment" v={preferment} t="i" />
                <NRow k="digestibility" v={`${digest} / 100`} t="i" />
              </div>
              <div className="fc-nerd-col">
                <p className="fc-src-label">{t('nerd.col.recipe')}</p>
                <NRow k="flour" v={`${r.flour.toFixed(0)} g`} t="g" />
                <NRow k="water" v={`${r.waterG.toFixed(0)} g`} t="g" />
                <NRow k="salt" v={`${r.saltGrams.toFixed(1)} g`} t="g" />
                <NRow k="oil" v={`${r.oilGrams.toFixed(1)} g`} t="g" />
                <NRow k="sugar" v={`${r.sugarGrams.toFixed(1)} g`} t="g" />
                <NRow k="total dough" v={`${doughWeight} g`} t="g" />
                <NRow k="room temp" v={`${roomTemp} °C`} t="g" />
                <NRow k="target dough temp" v={`${ddt} °C`} t="g" />
                <NRow k="friction factor" v={`+${friction} °C`} t="g" />
                <NRow k="→ water temp" v={`~${waterTempReco} °C`} t="g" />
              </div>
              <div className="fc-nerd-col">
                <p className="fc-src-label">{t('nerd.col.flour')}</p>
                <NRow k="protein" v={`${protein}%`} t="g" />
                <NRow k="est. W" v={`${fp.W}`} t="h" />
                <NRow k="P/L balance" v={pl.toFixed(2)} t="i" />
                <NRow k="hydration window" v={`${fp.hydrLo}–${fp.hydrHi}%`} t="h" />
                <NRow k="ferment capacity" v={`~${Math.round(fp.maxHours)} h`} t="h" />
                <NRow k="proof quality" v={proofQuality.toFixed(2)} t="h" />
                <NRow k="Gompertz λ (lag)" v={`${curve.lambda.toFixed(2)} h`} t="h" />
                <NRow k="Gompertz μₘ" v={curve.mu.toFixed(2)} t="h" />
                <NRow k="peak rise A" v={`${curve.Arise.toFixed(0)}%`} t="h" />
                <NRow k="collapse decay k" v={curve.kd.toFixed(3)} t="h" />
              </div>
              <div className="fc-nerd-col">
                <p className="fc-src-label">{t('nerd.col.bake')}</p>
                <NRow k="oven" v={`${ovenC} °C`} t="g" />
                <NRow k="surface (k)" v={`${SURF[surface].label} · ${SURF[surface].k}`} t="h" />
                <NRow k="bake time" v={`${bake.t.toFixed(2)} min · ${Math.round(bake.t * 60)} s`} t="h" />
                <NRow k="crust top idx" v={`${bake.colour.toFixed(1)} / 100`} t="h" />
                <NRow k="crust base idx" v={`${bake.base.toFixed(1)} / 100`} t="h" />
                <NRow k="leoparding" v={bake.leopard ? "yes" : "no"} t="h" />
                <NRow k="acrylamide flag" v={bake.acryl ? "high" : "ok"} t="h" />
                <NRow k="style" v={bake.style} t="g" />
                <NRow k="oven-spring frac" v={springFrac.toFixed(2)} t="h" />
                <NRow k="rim spring index" v={rimIndex.toFixed(1)} t="i" />
              </div>
            </div>
            <p className="fc-subhead">{t('nerd.graph.head')}</p>
            <p className="fc-src-note" style={{ marginTop: 0, marginBottom: 6 }}>{t('nerd.graph.note')}</p>
            <DepGraph />
            <p className="fc-src-note">{t('nerd.formula.note')}</p>
          </div>
        )}

        <p className="fc-foot">{t('footer', { Q10 })}</p>

        <div className="fc-sources">
          <p className="fc-sources-head">{t('sources.head')}</p>
          {SOURCES.map((g) => (
            <div className="fc-src-group" key={g.group}>
              <p className="fc-src-label">{g.group}</p>
              <ul>
                {g.items.map((it, i) => (
                  <li key={i}>
                    <a href={it.u} target="_blank" rel="noopener noreferrer">{it.t}</a>
                  </li>
                ))}
              </ul>
            </div>
          ))}
          <p className="fc-src-note">{t('sources.note')}</p>
        </div>
       </LearnCtx.Provider>
      </div>
    </div>
    </LangCtx.Provider>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<FermentCalculator />);
  </script>
</body>
</html>
