<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizza Dough Calculator</title>
  <style>
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #333;
      --accent: #e85d04; --accent-dim: #9d2f00; --accent-bg: #1e1208;
      --text: #f0ede8; --text-dim: #888; --text-dimmer: #555;
      --green: #4caf50; --star: #f5a623; --danger: #c0392b;
      --radius: 12px; --transition: 0.15s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; line-height: 1.5; min-height: 100vh; }

    /* ── Header ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo-icon { font-size: 1.4rem; }
    .lang-toggle { display: flex; gap: 4px; background: var(--surface2); border-radius: 8px; padding: 4px; }
    .lang-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 5px 11px; border-radius: 6px; font-size: 0.82rem; font-weight: 600; transition: all var(--transition); }
    .lang-btn.active { background: var(--accent); color: #fff; }

    /* ── Layout ── */
    main { max-width: 860px; margin: 0 auto; padding: 32px 24px 100px; }
    section { margin-bottom: 40px; }
    h2 { font-size: 0.78rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }

    /* ── Recipe cards ── */
    .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .recipe-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px 18px; cursor: pointer; transition: all var(--transition); position: relative; }
    .recipe-card:hover { border-color: var(--accent-dim); }
    .recipe-card.selected { border-color: var(--accent); background: var(--accent-bg); }
    .recipe-card .check { position: absolute; top: 10px; right: 10px; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); display: none; align-items: center; justify-content: center; font-size: 0.65rem; }
    .recipe-card.selected .check { display: flex; }
    .recipe-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
    .recipe-tag { display: inline-block; font-size: 0.68rem; font-weight: 700; background: #2a1800; color: var(--accent); border-radius: 4px; padding: 1px 6px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
    .recipe-meta { font-size: 0.78rem; color: var(--text-dim); line-height: 1.6; }

    /* ── Quantity controls ── */
    .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 480px) { .controls-grid { grid-template-columns: 1fr; } }
    .field label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
    .input-wrap { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color var(--transition); }
    .input-wrap:focus-within { border-color: var(--accent); }
    .input-wrap button { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.15rem; padding: 0 13px; height: 46px; display: flex; align-items: center; transition: color var(--transition); user-select: none; }
    .input-wrap button:hover { color: var(--accent); }
    .input-wrap input { background: none; border: none; color: var(--text); font-size: 1.05rem; font-weight: 600; text-align: center; width: 100%; height: 46px; outline: none; }
    input[type=number]::-webkit-inner-spin-button { display: none; }
    .unit { color: var(--text-dim); font-size: 0.82rem; padding-right: 13px; white-space: nowrap; }

    /* ── Sliders ── */
    .slider-list { display: flex; flex-direction: column; gap: 14px; }
    .slider-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; }
    .slider-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
    .slider-label { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
    .slider-value-wrap { display: flex; align-items: center; gap: 8px; }
    .slider-value { font-size: 1.05rem; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 52px; text-align: right; }
    .slider-reset { background: none; border: 1px solid var(--border); color: var(--text-dimmer); cursor: pointer; font-size: 0.68rem; padding: 2px 7px; border-radius: 4px; transition: all var(--transition); }
    .slider-reset:hover { border-color: var(--accent); color: var(--accent); }
    input[type=range] { --fill: 0%; appearance: none; -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: linear-gradient(to right, var(--accent) var(--fill), var(--border) var(--fill)); outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 3px solid var(--bg); box-shadow: 0 0 0 1px var(--accent); transition: transform var(--transition); }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
    input[type=range]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 3px solid var(--bg); box-shadow: 0 0 0 1px var(--accent); }
    .slider-range-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.68rem; color: var(--text-dimmer); }

    /* ── Fermentation controls ── */
    .ferment-controls { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
    .toggle-group { display: flex; gap: 4px; background: var(--surface2); border-radius: 8px; padding: 4px; width: fit-content; }
    .toggle-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 6px 14px; border-radius: 6px; font-size: 0.82rem; font-weight: 600; transition: all var(--transition); }
    .toggle-btn.active { background: var(--accent); color: #fff; }

    /* ── Ingredient table ── */
    .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .result-header { background: var(--surface2); padding: 12px 18px; font-size: 0.72rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; display: flex; justify-content: space-between; }
    .ingredient-row { display: flex; align-items: center; padding: 13px 18px; border-top: 1px solid var(--border); transition: background var(--transition); }
    .ingredient-row:hover { background: var(--surface2); }
    .ingredient-row.optional { opacity: 0.6; }
    .ing-name { flex: 1; font-weight: 500; font-size: 0.92rem; }
    .ing-pct { color: var(--text-dim); font-size: 0.78rem; margin-right: 20px; width: 50px; text-align: right; font-variant-numeric: tabular-nums; }
    .ing-amount { font-weight: 700; font-size: 1rem; width: 76px; text-align: right; font-variant-numeric: tabular-nums; }
    .ing-unit { color: var(--text-dim); font-size: 0.78rem; margin-left: 5px; width: 22px; }
    .optional-badge { font-size: 0.65rem; color: var(--text-dimmer); background: var(--surface2); border-radius: 4px; padding: 1px 5px; margin-left: 6px; }
    .total-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--accent-bg); border-top: 2px solid var(--accent); }
    .total-label { font-weight: 700; }
    .total-amount { font-weight: 800; font-size: 1.1rem; color: var(--accent); font-variant-numeric: tabular-nums; }
    .source-link { font-size: 0.76rem; color: var(--text-dimmer); margin-top: 8px; }
    .source-link a { color: var(--accent); text-decoration: none; }
    .source-link a:hover { text-decoration: underline; }

    /* ── Nutrition ── */
    .nutrition-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    @media (max-width: 560px) { .nutrition-grid { grid-template-columns: repeat(2, 1fr); } }
    .nutrition-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
    .nutrition-value { font-size: 1.3rem; font-weight: 800; font-variant-numeric: tabular-nums; }
    .nutrition-label { font-size: 0.72rem; color: var(--text-dim); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
    .nutrition-note { font-size: 0.7rem; color: var(--text-dimmer); text-align: center; margin-top: 8px; }

    /* ── Fermentation guide ── */
    .ferment-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .ferment-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .ferment-card.active { border-color: var(--accent); background: var(--accent-bg); }
    .ferment-time { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
    .ferment-desc { font-size: 0.76rem; color: var(--text-dim); line-height: 1.5; }

    /* ── Configs ── */
    .save-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .save-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0 14px; height: 42px; font-size: 0.9rem; outline: none; transition: border-color var(--transition); }
    .save-row input:focus { border-color: var(--accent); }
    .save-row input::placeholder { color: var(--text-dimmer); }
    .btn-primary { background: var(--accent); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 700; padding: 0 18px; height: 42px; white-space: nowrap; transition: opacity var(--transition); }
    .btn-primary:hover { opacity: 0.85; }
    .config-empty { color: var(--text-dimmer); font-size: 0.88rem; padding: 20px 0; }
    .config-list { display: flex; flex-direction: column; gap: 12px; }
    .config-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
    .config-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .config-name { font-weight: 700; font-size: 0.95rem; }
    .config-recipe-tag { font-size: 0.65rem; font-weight: 700; background: #2a1800; color: var(--accent); border-radius: 4px; padding: 2px 7px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
    .config-meta { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 6px; }
    .config-rating-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .config-stars { color: var(--star); font-size: 0.9rem; letter-spacing: 1px; }
    .config-unrated { font-size: 0.76rem; color: var(--text-dimmer); }
    .config-baked { font-size: 0.76rem; color: var(--text-dimmer); }
    .config-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-sm { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); cursor: pointer; font-size: 0.75rem; font-weight: 600; padding: 5px 12px; transition: all var(--transition); }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm.danger:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Rating modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
    .modal-overlay[hidden] { display: none; }
    .modal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .modal-title { font-size: 1rem; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.1rem; padding: 4px; transition: color var(--transition); }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 18px; }
    .modal-field label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .modal-field input[type=date], .modal-field textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; width: 100%; font-size: 0.9rem; outline: none; transition: border-color var(--transition); }
    .modal-field input[type=date]:focus, .modal-field textarea:focus { border-color: var(--accent); }
    .modal-field textarea { resize: vertical; min-height: 70px; font-family: inherit; }
    .dim-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .dim-row:last-child { border-bottom: none; }
    .dim-label { font-size: 0.85rem; font-weight: 500; }
    .star-group { display: flex; gap: 2px; }
    .star-btn { background: none; border: none; color: var(--text-dimmer); cursor: pointer; font-size: 1.3rem; padding: 2px; transition: color var(--transition); line-height: 1; }
    .star-btn.filled { color: var(--star); }
    .star-btn:hover { color: var(--star); }
    .modal-footer { display: flex; gap: 10px; padding: 16px 20px; border-top: 1px solid var(--border); }
    .btn-ghost { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; font-weight: 600; padding: 0 16px; height: 40px; transition: all var(--transition); }
    .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }
    .modal-footer .btn-primary { height: 40px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">🍕</span>
    <span class="app-title">Pizza Dough Calculator</span>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lang-btn" onclick="setLang('de')" id="btn-de">DE</button>
  </div>
</header>

<main>

  <section>
    <h2 data-i18n="section_recipe"></h2>
    <div class="recipe-grid" id="recipe-grid"></div>
  </section>

  <section>
    <h2 data-i18n="section_quantity"></h2>
    <div class="controls-grid">
      <div class="field">
        <label data-i18n="label_balls"></label>
        <div class="input-wrap">
          <button onclick="adj('balls',-1)">−</button>
          <input type="number" id="balls" value="2" min="1" max="50" oninput="calculate()" />
          <button onclick="adj('balls',+1)">+</button>
        </div>
      </div>
      <div class="field">
        <label data-i18n="label_weight"></label>
        <div class="input-wrap">
          <button onclick="adj('weight',-10)">−</button>
          <input type="number" id="weight" value="280" min="80" max="1000" oninput="calculate()" />
          <button onclick="adj('weight',+10)">+</button>
          <span class="unit">g</span>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2 data-i18n="section_adjust"></h2>
    <div class="slider-list" id="slider-list"></div>
  </section>

  <section>
    <h2 data-i18n="section_fermentation_cfg"></h2>
    <div class="ferment-controls">
      <div class="slider-row" id="ferment-time-row">
        <div class="slider-header">
          <span class="slider-label" data-i18n="label_ferment_hours"></span>
          <div class="slider-value-wrap">
            <span class="slider-value" id="val-ferment-hours">72h</span>
          </div>
        </div>
        <input type="range" id="sl-ferment-hours" min="4" max="120" step="4" value="72"
               oninput="onFermentSlider()" />
        <div class="slider-range-labels"><span>4h</span><span>120h</span></div>
      </div>
      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-label" data-i18n="label_ferment_method"></span>
          <div class="toggle-group">
            <button class="toggle-btn active" id="btn-cold" onclick="setFermentMethod('cold')" data-i18n="ferment_cold"></button>
            <button class="toggle-btn" id="btn-room" onclick="setFermentMethod('room')" data-i18n="ferment_room"></button>
          </div>
        </div>
      </div>
    </div>
    <div class="ferment-grid" id="ferment-grid"></div>
  </section>

  <section>
    <h2 data-i18n="section_ingredients"></h2>
    <div class="result-card">
      <div class="result-header">
        <span data-i18n="col_ingredient"></span>
        <div style="display:flex;gap:44px">
          <span data-i18n="col_pct"></span>
          <span data-i18n="col_amount"></span>
        </div>
      </div>
      <div id="ingredient-list"></div>
      <div class="total-row">
        <span class="total-label" data-i18n="label_total"></span>
        <span class="total-amount" id="total-weight"></span>
      </div>
    </div>
    <div class="source-link" id="source-link"></div>
  </section>

  <section>
    <h2 data-i18n="section_nutrition"></h2>
    <div class="nutrition-grid" id="nutrition-grid"></div>
    <div class="nutrition-note" data-i18n="nutrition_note"></div>
  </section>

  <section>
    <h2 data-i18n="section_ferment_guide"></h2>
    <div class="ferment-grid" id="ferment-guide-grid"></div>
  </section>

  <section>
    <h2 data-i18n="section_configs"></h2>
    <div class="save-row">
      <input type="text" id="config-name-input" data-i18n-ph="config_name_ph" />
      <button class="btn-primary" onclick="saveConfig()" data-i18n="btn_save_config"></button>
    </div>
    <div id="config-list"></div>
  </section>

</main>

<!-- Rating modal -->
<div id="rating-modal" class="modal-overlay" hidden>
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title" data-i18n="modal_rate_title"></span>
      <button class="modal-close" onclick="closeRating()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label data-i18n="label_baked_at"></label>
        <input type="date" id="rating-date" />
      </div>
      <div id="rating-dimensions"></div>
      <div class="modal-field">
        <label data-i18n="label_notes"></label>
        <textarea id="rating-notes" rows="3"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="saveRating()" data-i18n="btn_save_rating"></button>
      <button class="btn-ghost" onclick="closeRating()" data-i18n="btn_cancel"></button>
    </div>
  </div>
</div>

<script>
// ─── i18n ─────────────────────────────────────────────────────────────────
const STRINGS = {

    section_ferment_guide: "Fermentation guide", section_configs: "My Configs",
    label_balls: "Dough balls", label_weight: "Weight per ball",
    label_hydration: "Hydration", label_salt: "Salt", label_yeast: "Yeast",
    label_oil: "Oil", label_sugar: "Sugar", label_malt: "Diastatic malt",
    label_sweetener: "Sweetener",

    nutr_protein: "Protein", nutr_carbs: "Carbs", nutr_fat: "Fat", nutr_calories: "Calories",
    nutrition_note: "Approximate values · Water and salt not counted",

    section_configs: "My Configs", btn_save_config: "Save Config",
    config_name_ph: "Name this config…",
    config_empty: "No saved configs yet. Adjust settings above and save.",
    btn_load: "Load", btn_rate: "Rate", btn_delete: "Delete",
    config_unrated: "Not yet rated",
    config_baked_on: "Baked",
    modal_rate_title: "Rate this bake",
    label_baked_at: "Baked on", label_notes: "Notes",
    btn_save_rating: "Save rating", btn_cancel: "Cancel",
    btn_reset: "Reset",
    dim_oven_spring: "Oven spring", dim_bottom_color: "Bottom color",
    dim_spotting_neo: "Leoparding", dim_spotting_other: "Browning",
    dim_crumb: "Crumb structure", dim_texture: "Crust texture",
    dim_flavor: "Flavor complexity", dim_overall: "Overall",
  },
  de: {
    app_title: "Pizzateig-Rechner",
    section_recipe: "Rezept", section_quantity: "Menge",
    section_adjust: "Anpassen", section_fermentation_cfg: "Gärführung",
    section_ingredients: "Zutaten", section_nutrition: "Nährwerte pro Teigling",
    section_ferment_guide: "Gärführungs-Guide", section_configs: "Meine Configs",

    label_hydration: "Hydration", label_salt: "Salz", label_yeast: "Hefe",

    label_sweetener: "Süßungsmittel",
    label_ferment_hours: "Gärzeit", label_ferment_method: "Methode",
    ferment_cold: "Kalt (4 °C)", ferment_room: "Raumtemp. (22 °C)",
    col_ingredient: "Zutat", col_pct: "%", col_amount: "Menge",
    label_total: "Teig gesamt", badge_optional: "optional",
    unit_g: "g", unit_kcal: "kcal",
    nutr_protein: "Eiweiß", nutr_carbs: "Kohlenhydrate", nutr_fat: "Fett", nutr_calories: "Kalorien",
    nutrition_note: "Näherungswerte · Wasser und Salz nicht eingerechnet",
    source_prefix: "Basierend auf",
    btn_save_config: "Config speichern",

// ─── State ────────────────────────────────────────────────────────────────
let selectedRecipe = RECIPES[0];
let fermentHours = 72;
let fermentCold  = true;
let ratingConfigId = null;
let ratingValues = {};

const CONFIGS_KEY = "pizza-configs";
const uid = () => (crypto.randomUUID?.() || Date.now().toString(36) + Math.random().toString(36).slice(2));

// ─── Render recipes ───────────────────────────────────────────────────────
function renderRecipes() {
  const grid = document.getElementById("recipe-grid");
  grid.innerHTML = "";
  RECIPES.forEach(r => {
    const card = document.createElement("div");
    card.className = "recipe-card" + (r.id === selectedRecipe.id ? " selected" : "");
    card.innerHTML = `<div class="check">✓</div>
      <div class="recipe-name">${r.name[lang]}</div>
      <div class="recipe-tag">${r.tag[lang]}</div>
      <div class="recipe-meta">${r.metaDesc[lang]}</div>`;
    card.onclick = () => { selectedRecipe = r; renderRecipes(); renderSliders(); calculate(); renderFermentGuide(); };
    grid.appendChild(card);
  });
}

// ─── Dynamic sliders ──────────────────────────────────────────────────────
function renderSliders() {
  const list = document.getElementById("slider-list");
  list.innerHTML = "";
  selectedRecipe.sliders.forEach(sc => {
    const defVal = ingDefault(sc.ingKey);
    const row = document.createElement("div");
    row.className = "slider-row";
    row.innerHTML = `
      <div class="slider-header">
        <span class="slider-label">${t(sc.labelKey)}</span>
        <div class="slider-value-wrap">
          <span class="slider-value" id="val-${sc.ingKey}"></span>
          <button class="slider-reset" onclick="resetSlider('${sc.ingKey}')">${t("btn_reset")}</button>
        </div>
      </div>
      <input type="range" id="sl-${sc.ingKey}"
             min="${sc.min}" max="${sc.max}" step="${sc.step}" value="${defVal}"
             oninput="onSlider('${sc.ingKey}')" />
      <div class="slider-range-labels"><span>${sc.min}%</span><span>${sc.max}%</span></div>`;
    list.appendChild(row);
    syncSliderTrack(sc.ingKey);
    syncSliderValue(sc.ingKey, sc.decimals);
  });
}

function ingDefault(ingKey) {
  const ing = selectedRecipe.ingredients.find(i => i.key === ingKey);
  return ing ? ing.pct : 0;
}

function sliderCfg(ingKey) {
  return selectedRecipe.sliders.find(s => s.ingKey === ingKey);
}

function getSliderVal(ingKey) {
  const el = document.getElementById("sl-" + ingKey);
  return el ? parseFloat(el.value) : ingDefault(ingKey);
}

function onSlider(ingKey) {
  const sc = sliderCfg(ingKey);
  syncSliderTrack(ingKey);
  syncSliderValue(ingKey, sc?.decimals ?? 1);
  calculate();
}

function resetSlider(ingKey) {
  const el = document.getElementById("sl-" + ingKey);
  if (!el) return;
  el.value = ingDefault(ingKey);
  onSlider(ingKey);
}

function syncSliderTrack(ingKey) {
  const el = document.getElementById("sl-" + ingKey);
  if (!el) return;
  const pct = ((parseFloat(el.value) - parseFloat(el.min)) / (parseFloat(el.max) - parseFloat(el.min))) * 100;
  el.style.setProperty("--fill", pct + "%");
}

function syncSliderValue(ingKey, decimals) {
  const el = document.getElementById("sl-" + ingKey);
  const val = el ? parseFloat(el.value) : ingDefault(ingKey);
  const d = decimals ?? (val < 1 ? 2 : 1);
  const display = document.getElementById("val-" + ingKey);
  if (display) display.textContent = val.toFixed(d) + "%";
}

// ─── Fermentation controls ────────────────────────────────────────────────
function onFermentSlider() {
  fermentHours = parseInt(document.getElementById("sl-ferment-hours").value);
  document.getElementById("val-ferment-hours").textContent = fermentHours + "h";
  const pct = ((fermentHours - 4) / (120 - 4)) * 100;
  document.getElementById("sl-ferment-hours").style.setProperty("--fill", pct + "%");
  renderFermentGuide();
}

function setFermentMethod(method) {
  fermentCold = method === "cold";
  document.getElementById("btn-cold").classList.toggle("active", fermentCold);
  document.getElementById("btn-room").classList.toggle("active", !fermentCold);
  renderFermentGuide();
}

function renderFermentGuide() {
  const grid = document.getElementById("ferment-guide-grid");
  grid.innerHTML = selectedRecipe.fermentation.map(f => {
    const active = Math.abs(f.hours - fermentHours) <= 12 && f.cold === fermentCold;
    return `<div class="ferment-card${active ? " active" : ""}">
      <div class="ferment-time">${f.time[lang]}</div>
      <div class="ferment-desc">${f.desc[lang]}</div>
    </div>`;
  }).join("");
}

// ─── Calculate ───────────────────────────────────────────────────────────
const NUTR = {
  flour: { kcal: 3.55, protein: 0.12, carbs: 0.72, fat: 0.015 },
  oil:   { kcal: 8.84, protein: 0,    carbs: 0,    fat: 1.0 },
  sugar: { kcal: 3.87, protein: 0,    carbs: 1.0,  fat: 0 },
  water: { kcal: 0, protein: 0, carbs: 0, fat: 0 },
  zero:  { kcal: 0, protein: 0, carbs: 0, fat: 0 },
};

function calculate() {
  const balls  = Math.max(1, parseInt(document.getElementById("balls").value)  || 1);
  const weight = Math.max(50, parseInt(document.getElementById("weight").value) || 280);
  const r = selectedRecipe;
  const totalDough = balls * weight;

  const effectivePct = {};
  r.ingredients.forEach(ing => {
    effectivePct[ing.key] = r.sliders?.find(s => s.ingKey === ing.key)
      ? getSliderVal(ing.key)
      : ing.pct;
  });

  const sumPct = Object.values(effectivePct).reduce((a, v) => a + v, 0);
  const flourGrams = totalDough / (sumPct / 100);

  // Ingredients
  const list = document.getElementById("ingredient-list");
  list.innerHTML = "";
  let nutrKcal = 0, nutrProtein = 0, nutrCarbs = 0, nutrFat = 0;

  r.ingredients.forEach(ing => {
    const pct = effectivePct[ing.key];
    const grams = flourGrams * (pct / 100);
    const nf = NUTR[ing.nutrition ?? "zero"];
    nutrKcal    += grams * nf.kcal;
    nutrProtein += grams * nf.protein;
    nutrCarbs   += grams * nf.carbs;
    nutrFat     += grams * nf.fat;

    const row = document.createElement("div");
    row.className = "ingredient-row" + (ing.optional ? " optional" : "");
    row.innerHTML = `
      <div class="ing-name">${ing[lang]}${ing.optional ? `<span class="optional-badge">${t("badge_optional")}</span>` : ""}</div>
      <div class="ing-pct">${pct.toFixed(pct < 1 ? 2 : 1)}%</div>
      <div class="ing-amount">${fmt(grams)}</div>
      <div class="ing-unit">${t("unit_g")}</div>`;
    list.appendChild(row);
  });

  document.getElementById("total-weight").textContent = `${fmt(totalDough)} ${t("unit_g")}`;

  const src = r.source;
  document.getElementById("source-link").innerHTML = src
    ? `${t("source_prefix")} <a href="${src.url}" target="_blank" rel="noopener">${src.label}</a>`
    : "";

  // Nutrition (per single ball)
  const fac = 1 / balls;
  document.getElementById("nutrition-grid").innerHTML = `
    <div class="nutrition-card"><div class="nutrition-value">${Math.round(nutrKcal * fac)}</div><div class="nutrition-label">${t("nutr_calories")} ${t("unit_kcal")}</div></div>
    <div class="nutrition-card"><div class="nutrition-value">${Math.round(nutrProtein * fac)}&thinsp;g</div><div class="nutrition-label">${t("nutr_protein")}</div></div>
    <div class="nutrition-card"><div class="nutrition-value">${Math.round(nutrCarbs * fac)}&thinsp;g</div><div class="nutrition-label">${t("nutr_carbs")}</div></div>
    <div class="nutrition-card"><div class="nutrition-value">${Math.round(nutrFat * fac)}&thinsp;g</div><div class="nutrition-label">${t("nutr_fat")}</div></div>`;
}

function fmt(n) { return n < 10 ? n.toFixed(1) : Math.round(n).toString(); }

function adj(field, delta) {
  const el = document.getElementById(field);
  el.value = Math.min(+el.max, Math.max(+el.min, (+el.value || 0) + delta));
  calculate();
}

// ─── Config: localStorage ─────────────────────────────────────────────────
function loadConfigs() {
  try { return JSON.parse(localStorage.getItem(CONFIGS_KEY)) || []; } catch { return []; }
}
function persistConfigs(list) { localStorage.setItem(CONFIGS_KEY, JSON.stringify(list)); }

function saveConfig() {
  const nameEl = document.getElementById("config-name-input");
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }

  const overrides = {};
  selectedRecipe.sliders?.forEach(sc => { overrides[sc.ingKey] = getSliderVal(sc.ingKey); });

  const cfg = {
    id: uid(),
    name,
    recipeId: selectedRecipe.id,
    createdAt: new Date().toISOString(),
    balls: parseInt(document.getElementById("balls").value),
    ballWeightG: parseInt(document.getElementById("weight").value),
    overrides,
    fermentation: { hours: fermentHours, cold: fermentCold },
    bakedAt: null, rating: null, notes: "",
  };

  const list = loadConfigs();
  list.unshift(cfg);
  persistConfigs(list);
  nameEl.value = "";
  renderConfigs();
}

function loadConfig(id) {
  const cfg = loadConfigs().find(c => c.id === id);
  if (!cfg) return;

  const recipe = RECIPES.find(r => r.id === cfg.recipeId);
  if (!recipe) return;
  selectedRecipe = recipe;
  renderRecipes();
  renderSliders();

  document.getElementById("balls").value  = cfg.balls;
  document.getElementById("weight").value = cfg.ballWeightG;
  fermentHours = cfg.fermentation?.hours ?? 72;
  fermentCold  = cfg.fermentation?.cold  ?? true;
  document.getElementById("sl-ferment-hours").value = fermentHours;
  onFermentSlider();
  document.getElementById("btn-cold").classList.toggle("active", fermentCold);
  document.getElementById("btn-room").classList.toggle("active", !fermentCold);

  if (cfg.overrides) {
    Object.entries(cfg.overrides).forEach(([key, val]) => {
      const el = document.getElementById("sl-" + key);
      if (el) { el.value = val; onSlider(key); }
    });
  }
  calculate();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function deleteConfig(id) {
  if (!confirm(lang === "de" ? "Config löschen?" : "Delete config?")) return;
  persistConfigs(loadConfigs().filter(c => c.id !== id));
  renderConfigs();
}

function renderConfigs() {
  const list = loadConfigs();
  const el = document.getElementById("config-list");
  if (!list.length) {
    el.innerHTML = `<div class="config-empty">${t("config_empty")}</div>`;
    return;
  }
  el.innerHTML = `<div class="config-list">${list.map(cfg => {
    const recipe = RECIPES.find(r => r.id === cfg.recipeId);
    const recipeName = recipe ? recipe.name[lang] : cfg.recipeId;
    const date = new Date(cfg.createdAt).toLocaleDateString(lang === "de" ? "de-DE" : "en-GB");
    const hydration = cfg.overrides?.water ? cfg.overrides.water.toFixed(1) + "%" : "—";
    const fermentLabel = cfg.fermentation ? `${cfg.fermentation.hours}h ${cfg.fermentation.cold ? (lang === "de" ? "kalt" : "cold") : (lang === "de" ? "RT" : "RT")}` : "";
    const bakedLine = cfg.bakedAt
      ? `<span class="config-baked">${t("config_baked_on")} ${new Date(cfg.bakedAt).toLocaleDateString(lang === "de" ? "de-DE" : "en-GB")}</span>`
      : "";
    const stars = cfg.rating
      ? `<span class="config-stars">${starsStr(cfg.rating.overall)}</span>`
      : `<span class="config-unrated">${t("config_unrated")}</span>`;
    return `<div class="config-card">
      <div class="config-card-header">
        <span class="config-name">${esc(cfg.name)}</span>
        <span class="config-recipe-tag">${recipeName}</span>
      </div>
      <div class="config-meta">${cfg.balls} × ${cfg.ballWeightG}g · ${hydration} · ${fermentLabel}</div>
      <div class="config-meta">${date}</div>
      <div class="config-rating-row">${stars}${bakedLine}</div>
      <div class="config-actions">
        <button class="btn-sm" onclick="loadConfig('${cfg.id}')">${t("btn_load")}</button>
        <button class="btn-sm" onclick="openRating('${cfg.id}')">${t("btn_rate")}</button>
        <button class="btn-sm danger" onclick="deleteConfig('${cfg.id}')">${t("btn_delete")}</button>
      </div>
    </div>`;
  }).join("")}</div>`;
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function starsStr(n) { return "★".repeat(Math.round(n || 0)) + "☆".repeat(5 - Math.round(n || 0)); }

// ─── Rating modal ────────────────────────────────────────────────────────
const DIMS = ["ovenSpring","bottomColor","spotting","crumbStructure","crustTexture","flavorComplexity","overall"];
function dimLabel(key) {
  if (key === "spotting") return t(selectedRecipe.leoparding ? "dim_spotting_neo" : "dim_spotting_other");
  return t("dim_" + key.replace(/([A-Z])/g, c => "_" + c.toLowerCase()));
}

function openRating(id) {
  ratingConfigId = id;
  const cfg = loadConfigs().find(c => c.id === id);
  if (!cfg) return;
  const recipe = RECIPES.find(r => r.id === cfg.recipeId) || selectedRecipe;

  document.querySelector("[data-i18n='modal_rate_title']").textContent = cfg.name;
  document.getElementById("rating-date").value = cfg.bakedAt ? cfg.bakedAt.slice(0,10) : new Date().toISOString().slice(0,10);
  document.getElementById("rating-notes").value = cfg.notes || "";
  ratingValues = cfg.rating ? { ...cfg.rating } : {};

  const container = document.getElementById("rating-dimensions");
  container.innerHTML = DIMS.map(key => {
    const label = key === "spotting"
      ? t(recipe.leoparding ? "dim_spotting_neo" : "dim_spotting_other")
      : t("dim_" + key.replace(/([A-Z])/g, c => "_" + c.toLowerCase()));
    const cur = ratingValues[key] || 0;
    const stars = Array.from({length:5},(_,i) =>
      `<button class="star-btn${i < cur ? " filled" : ""}" onclick="setStar('${key}',${i+1})">★</button>`
    ).join("");
    return `<div class="dim-row"><span class="dim-label">${label}</span><div class="star-group" id="stars-${key}">${stars}</div></div>`;
  }).join("");

  document.getElementById("rating-modal").hidden = false;
}

function closeRating() {
  document.getElementById("rating-modal").hidden = true;
  ratingConfigId = null;
}

function setStar(dim, val) {
  ratingValues[dim] = val;
  const group = document.getElementById("stars-" + dim);
  group.querySelectorAll(".star-btn").forEach((btn, i) => {
    btn.classList.toggle("filled", i < val);
  });
}

function saveRating() {
  if (!ratingConfigId) return;
  const list = loadConfigs();
  const idx = list.findIndex(c => c.id === ratingConfigId);
  if (idx === -1) return;
  list[idx].bakedAt = document.getElementById("rating-date").value || new Date().toISOString().slice(0,10);
  list[idx].notes   = document.getElementById("rating-notes").value;
  list[idx].rating  = { ...ratingValues };
  persistConfigs(list);
  closeRating();
  renderConfigs();
}

// close modal on backdrop click
document.getElementById("rating-modal").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeRating();
});

// ─── Init ─────────────────────────────────────────────────────────────────
renderRecipes();
renderSliders();
onFermentSlider();
calculate();
renderFermentGuide();
renderConfigs();
// apply i18n to static elements
document.querySelectorAll("[data-i18n]").forEach(el => el.textContent = t(el.dataset.i18n));
document.querySelectorAll("[data-i18n-ph]").forEach(el => el.placeholder = t(el.dataset.i18nPh));
</script>
</body>
