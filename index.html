<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FCF8F0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Forno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Forno Design System Tokens ── */
    :root {
      /* Dough / cream surfaces */
      --dough-50:  #FCF8F0;
      --dough-100: #F8F1E3;
      --dough-200: #F0E6D2;
      --dough-300: #E4D4BA;
      --dough-400: #D2BC97;

      /* Char (wood-fired near-black) */
      --char-900: #1E1814;
      --char-800: #2A221C;
      --char-700: #3D332A;
      --char-600: #5A4C40;
      --char-500: #7A6A5B;
      --char-400: #9C8C7C;

      /* Terracotta (primary) */
      --terra-700: #8F3E22;
      --terra-600: #A84A29;
      --terra-500: #C25A33;
      --terra-400: #D27A52;
      --terra-300: #E3A483;
      --terra-200: #F0C9B4;
      --terra-100: #F8E5DA;

      /* Basil (accent / success) */
      --basil-700: #3F5A2C;
      --basil-600: #4F6E37;
      --basil-500: #648A45;
      --basil-300: #ABC593;
      --basil-200: #D2E0C0;
      --basil-100: #ECF2E2;

      /* Tomato (danger) */
      --tomato-600: #A82C22;
      --tomato-500: #C5362A;
      --tomato-100: #F8DDDA;

      /* Heat scale */
      --heat-cold:   #6E8CA8;
      --heat-cool:   #9FB0A6;
      --heat-pale:   #ECD9A8;
      --heat-golden: #D99B36;
      --heat-ember:  #C2641F;
      --heat-char:   #6E3415;
      --heat-burnt:  #2E1A10;

      /* Semantic aliases */
      --surface-canvas: var(--dough-50);
      --surface-card:   var(--dough-100);
      --surface-well:   var(--dough-200);
      --surface-ink:    var(--char-900);
      --text-strong: var(--char-900);
      --text-body:   var(--char-700);
      --text-muted:  var(--char-500);
      --text-faint:  var(--char-400);
      --text-on-dark: var(--dough-100);
      --brand:          var(--terra-500);
      --brand-hover:    var(--terra-600);
      --brand-press:    var(--terra-700);
      --brand-subtle:   var(--terra-100);
      --accent:         var(--basil-500);
      --accent-subtle:  var(--basil-100);
      --ok:      var(--basil-500);
      --ok-bg:   var(--basil-100);
      --warn:    var(--heat-ember);
      --warn-bg: #F8E6D0;
      --danger:      var(--tomato-500);
      --danger-bg:   var(--tomato-100);
      --line:        var(--dough-300);
      --line-strong: var(--dough-400);
      --line-on-dark: rgba(248,241,227,0.14);
      --focus: var(--terra-400);

      /* Radii — soft, hand-thrown */
      --radius-xs:  6px;
      --radius-sm:  10px;
      --radius-md:  14px;
      --radius-lg:  20px;
      --radius-xl:  28px;
      --radius-pill: 999px;

      /* Warm brown-tinted shadows */
      --shadow-xs: 0 1px 2px rgba(58,40,26,0.06);
      --shadow-sm: 0 2px 6px rgba(58,40,26,0.08);
      --shadow-md: 0 6px 18px rgba(58,40,26,0.10);
      --shadow-lg: 0 14px 38px rgba(46,26,16,0.16);
      --shadow-ink: 0 18px 44px rgba(20,12,6,0.40);
      --shadow-inset: inset 0 2px 5px rgba(58,40,26,0.10);

      /* Motion — calm, no bounce */
      --ease-out:  cubic-bezier(0.22, 0.61, 0.36, 1);
      --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
      --dur-fast: 120ms;
      --dur-base: 200ms;
      --t: var(--dur-base) var(--ease-out);

      /* Typography */
      --font-display: 'Spectral', Georgia, 'Times New Roman', serif;
      --font-sans: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;

      /* Layout */
      --tap:    52px;
      --pad:    18px;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    input  { -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--surface-canvas);
      color: var(--text-body);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    /* ── Eyebrow — the section label treatment ── */
    .forno-eyebrow, h2 {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ── Header ── */
    header {
      background: var(--surface-canvas);
      border-bottom: 1px solid var(--line);
      box-shadow: var(--shadow-xs);
      padding: 0 var(--pad);
      padding-top: env(safe-area-inset-top, 0px);
      height: calc(58px + env(safe-area-inset-top, 0px));
      display: flex; align-items: flex-end; padding-bottom: 0;
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between; height: 58px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-mark {
      width: 30px; height: 30px; flex-shrink: 0;
    }
    .app-title {
      font: 700 19px/1 var(--font-display);
      color: var(--text-strong);
      letter-spacing: -0.01em;
    }

    /* Segmented lang toggle */
    .lang-toggle {
      display: flex; gap: 2px;
      background: var(--surface-well);
      border-radius: var(--radius-md);
      padding: 3px;
      box-shadow: var(--shadow-inset);
    }
    .lang-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 0 13px; height: 36px;
      border-radius: calc(var(--radius-md) - 2px);
      font: 600 12px/1 var(--font-sans);
      letter-spacing: 0.04em;
      transition: color var(--t), background var(--t), box-shadow var(--t);
    }
    .lang-btn.active {
      background: var(--dough-50);
      color: var(--text-strong);
      box-shadow: var(--shadow-sm);
    }

    /* ── Layout ── */
    main {
      max-width: 860px; margin: 0 auto;
      padding: 28px var(--pad) calc(80px + var(--safe-b));
    }
    section { margin-bottom: 40px; }

    /* ── Recipe scroll strip ── */
    .recipe-scroll {
      display: flex; gap: 10px;
      overflow-x: auto; overflow-y: visible;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
      margin: 0 calc(-1 * var(--pad));
      padding-left: var(--pad); padding-right: var(--pad);
      scrollbar-width: none;
    }
    .recipe-scroll::-webkit-scrollbar { display: none; }

    .recipe-card {
      background: var(--surface-card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      cursor: pointer;
      transition: border-color var(--t), background var(--t), box-shadow var(--t), transform var(--dur-fast) var(--ease-out);
      position: relative; scroll-snap-align: start; flex-shrink: 0;
      min-width: 172px; max-width: 200px;
      box-shadow: var(--shadow-sm);
    }
    .recipe-card:active { transform: scale(0.98); }
    .recipe-card.selected {
      border-color: var(--brand);
      background: var(--brand-subtle);
      box-shadow: var(--shadow-md);
    }
    .recipe-card .check {
      position: absolute; top: 12px; right: 12px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--brand); color: #fff;
      display: none; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
    }
    .recipe-card.selected .check { display: flex; }
    .recipe-name {
      font: 700 15px/1.2 var(--font-sans);
      color: var(--text-strong);
      margin-bottom: 5px;
    }
    .recipe-tag {
      display: inline-block;
      font: 700 10px/1 var(--font-sans);
      letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--brand-subtle); color: var(--terra-700);
      border-radius: var(--radius-pill);
      padding: 3px 8px; margin-bottom: 10px;
    }
    .recipe-card.selected .recipe-tag {
      background: var(--terra-200); color: var(--terra-700);
    }
    .recipe-meta {
      font: 400 12px/1.55 var(--font-sans);
      color: var(--text-muted);
    }

    @media (min-width: 600px) {
      .recipe-scroll {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
        overflow: visible; margin: 0; padding: 0; gap: 10px;
      }
      .recipe-card { min-width: unset; max-width: unset; scroll-snap-align: unset; }
    }

    /* ── Quantity controls ── */
    .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field label {
      display: block;
      font: 700 12px/1 var(--font-sans);
      letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 9px;
    }
    .input-wrap {
      display: flex; align-items: center;
      background: var(--surface-well);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-inset);
      transition: border-color var(--t), box-shadow var(--t);
    }
    .input-wrap:focus-within {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px var(--brand-subtle), var(--shadow-inset);
    }
    .input-wrap button {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 1.25rem;
      min-width: var(--tap); height: var(--tap);
      display: flex; align-items: center; justify-content: center;
      transition: color var(--t), transform var(--dur-fast) var(--ease-out);
      user-select: none; flex-shrink: 0;
    }
    .input-wrap button:active { color: var(--brand); transform: scale(0.92); }
    .input-wrap input {
      background: none; border: none; color: var(--text-strong);
      font: 700 18px/1 var(--font-mono);
      text-align: center; width: 100%; height: var(--tap);
      outline: none; font-variant-numeric: tabular-nums;
    }
    input[type=number]::-webkit-inner-spin-button { display: none; }
    .unit {
      color: var(--text-muted);
      font: 500 13px/1 var(--font-mono);
      padding-right: 14px; white-space: nowrap;
    }

    /* ── Sliders ── */
    .slider-list { display: flex; flex-direction: column; gap: 10px; }
    .slider-row {
      background: var(--surface-card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      box-shadow: var(--shadow-sm);
    }
    .slider-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 16px;
    }
    .slider-label {
      font: 700 12px/1 var(--font-sans);
      letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .slider-value-wrap { display: flex; align-items: center; gap: 10px; }
    .slider-value {
      font: 700 18px/1 var(--font-mono);
      color: var(--text-strong);
      font-variant-numeric: tabular-nums;
      min-width: 60px; text-align: right;
    }
    .slider-reset {
      background: none;
      border: 1.5px solid var(--line-strong);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      font: 600 11px/1 var(--font-sans);
      letter-spacing: 0.04em;
      padding: 0 12px;
      min-height: 36px;
      transition: border-color var(--t), color var(--t), background var(--t);
    }
    .slider-reset:active {
      border-color: var(--brand);
      color: var(--brand);
      background: var(--brand-subtle);
    }

    /* Custom range input — Forno style */
    input[type=range] {
      --fill-color: var(--terra-500);
      --fill: 0%;
      appearance: none; -webkit-appearance: none;
      width: 100%; height: 8px; border-radius: var(--radius-pill);
      background: linear-gradient(to right, var(--fill-color) var(--fill), var(--dough-200) var(--fill));
      box-shadow: var(--shadow-inset);
      outline: none; cursor: pointer;
      transition: background var(--dur-fast) var(--ease-out);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--dough-50);
      border: 2.5px solid var(--fill-color);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: border-color var(--dur-base) var(--ease-out);
    }
    input[type=range]::-moz-range-thumb {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--dough-50);
      border: 2.5px solid var(--fill-color);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
    }
    .slider-range-labels {
      display: flex; justify-content: space-between;
      margin-top: 10px;
      font: 500 11px/1 var(--font-mono);
      color: var(--text-faint);
    }

    /* ── Fermentation controls ── */
    .ferment-controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    /* Segmented control — matches DS SegmentedControl */
    .toggle-group {
      display: flex; gap: 2px;
      background: var(--surface-well);
      border-radius: var(--radius-md);
      padding: 3px;
      box-shadow: var(--shadow-inset);
      width: 100%;
    }
    .toggle-btn {
      flex: 1; background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 0 10px; height: 40px;
      border-radius: calc(var(--radius-md) - 2px);
      font: 600 13px/1 var(--font-sans);
      transition: color var(--t), background var(--t), box-shadow var(--t);
      text-align: center; white-space: nowrap;
    }
    .toggle-btn.active {
      background: var(--dough-50);
      color: var(--text-strong);
      box-shadow: var(--shadow-sm);
    }
    @media (min-width: 480px) {
      .toggle-group { width: fit-content; }
      .toggle-btn { flex: none; padding: 0 20px; }
    }

    /* ── Ingredient table — IngredientRow style ── */
    .result-card {
      background: var(--surface-card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .result-header {
      padding: 12px 20px;
      font: 700 11px/1 var(--font-sans);
      letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--text-muted);
      display: flex; justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }
    .ingredient-row {
      display: flex; align-items: baseline;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      min-height: 52px; gap: 12px;
    }
    .ingredient-row:last-child { border-bottom: none; }
    .ingredient-row.optional { opacity: 0.6; }
    .ing-name {
      flex: 1; min-width: 0;
      font: 600 15px/1.2 var(--font-sans);
      color: var(--text-strong);
    }
    .optional-badge {
      display: inline-block;
      font: 700 10px/1 var(--font-sans);
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-muted);
      background: var(--dough-200);
      border-radius: var(--radius-pill);
      padding: 2px 7px; margin-left: 7px;
      vertical-align: middle;
    }
    .ing-pct {
      font: 500 12px/1 var(--font-mono);
      color: var(--text-faint);
      font-variant-numeric: tabular-nums;
      width: 44px; text-align: right;
    }
    .ing-amount {
      font: 700 20px/1 var(--font-mono);
      color: var(--text-strong);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .ing-unit {
      font: 500 13px/1 var(--font-sans);
      color: var(--text-muted);
      width: 16px;
    }
    .total-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      background: var(--brand-subtle);
      border-top: 2px solid var(--terra-300);
    }
    .total-label {
      font: 600 14px/1 var(--font-sans);
      color: var(--terra-700);
    }
    .total-amount {
      font: 700 22px/1 var(--font-mono);
      color: var(--brand);
      font-variant-numeric: tabular-nums;
    }
    .source-link {
      font: 400 13px/1 var(--font-sans);
      color: var(--text-faint);
      margin-top: 10px;
    }
    .source-link a { color: var(--brand); text-decoration: none; }
    .source-link a:hover { text-decoration: underline; }

    /* ── Nutrition ── */
    .nutrition-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media (min-width: 500px) { .nutrition-grid { grid-template-columns: repeat(4, 1fr); } }
    .nutrition-card {
      background: var(--surface-card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 18px 14px; text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .nutrition-value {
      font: 700 28px/1 var(--font-mono);
      color: var(--text-strong);
      font-variant-numeric: tabular-nums;
    }
    .nutrition-label {
      font: 700 11px/1 var(--font-sans);
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted); margin-top: 6px;
    }
    .nutrition-note {
      font: 400 12px/1 var(--font-sans);
      color: var(--text-faint); text-align: center; margin-top: 10px;
    }

    /* ── Fermentation guide cards ── */
    .ferment-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media (min-width: 480px) { .ferment-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }
    .ferment-card {
      background: var(--surface-card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 16px 17px;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--t), background var(--t), box-shadow var(--t);
    }
    .ferment-card.active {
      border-color: var(--brand);
      background: var(--brand-subtle);
      box-shadow: var(--shadow-md);
    }
    .ferment-time {
      font: 700 14px/1.2 var(--font-sans);
      color: var(--text-strong);
      margin-bottom: 6px;
    }
    .ferment-card.active .ferment-time { color: var(--terra-700); }
    .ferment-desc {
      font: 400 12px/1.55 var(--font-sans);
      color: var(--text-muted);
    }

    /* ── Config save row ── */
    .save-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .save-row input {
      background: var(--surface-well);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-md);
      color: var(--text-strong);
      padding: 0 16px;
      height: var(--tap);
      font: 500 16px/1 var(--font-sans);
      outline: none;
      box-shadow: var(--shadow-inset);
      transition: border-color var(--t), box-shadow var(--t);
      width: 100%;
    }
    .save-row input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px var(--brand-subtle), var(--shadow-inset);
    }
    .save-row input::placeholder { color: var(--text-faint); }
    @media (min-width: 480px) {
      .save-row { flex-direction: row; }
      .save-row input { flex: 1; }
    }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--brand);
      border: 1.5px solid transparent;
      border-radius: var(--radius-md);
      color: #fff;
      cursor: pointer;
      font: 600 15px/1 var(--font-sans);
      letter-spacing: 0.01em;
      padding: 0 22px; height: var(--tap);
      white-space: nowrap;
      box-shadow: var(--shadow-sm);
      transition: background var(--t), transform var(--dur-fast) var(--ease-out), box-shadow var(--t);
      width: 100%;
    }
    .btn-primary:active {
      background: var(--brand-press);
      transform: scale(0.97);
    }
    @media (min-width: 480px) { .btn-primary { width: auto; } }

    .btn-ghost {
      background: var(--surface-card);
      border: 1.5px solid var(--line-strong);
      border-radius: var(--radius-md);
      color: var(--text-body);
      cursor: pointer;
      font: 600 15px/1 var(--font-sans);
      height: var(--tap); width: 100%;
      box-shadow: var(--shadow-xs);
      transition: background var(--t), border-color var(--t), transform var(--dur-fast) var(--ease-out);
    }
    .btn-ghost:active {
      background: var(--dough-200);
      border-color: var(--char-500);
      transform: scale(0.97);
    }
    @media (min-width: 480px) { .btn-ghost { width: auto; flex: 1; } }

    /* ── Config cards ── */
    .config-empty {
      font: 400 14px/1.6 var(--font-sans);
      color: var(--text-muted);
      padding: 20px 0;
    }
    .config-list { display: flex; flex-direction: column; gap: 12px; }
    .config-card {
      background: var(--surface-card);

<main>

          <span class="unit">g</span>
        </div>
      </div>
    </div>
  </section>

  <section>

  <section>

          </div>
        </div>
      </div>
    </div>
    <div class="ferment-grid" id="ferment-grid"></div>
  </section>

  <section>
    <h2 data-i18n="section_ingredients"></h2>

</main>

// ─── State ────────────────────────────────────────────────────────────────
let selectedRecipe = RECIPES[0];
let fermentHours = 72;
let fermentCold  = true;
let ratingConfigId = null;
let ratingValues = {};

const CONFIGS_KEY = "pizza-configs";
const uid = () => (crypto.randomUUID?.() || Date.now().toString(36) + Math.random().toString(36).slice(2));

// ─── Render recipes ───────────────────────────────────────────────────────
function renderRecipes() {
  const grid = document.getElementById("recipe-grid");
  grid.innerHTML = "";
  RECIPES.forEach(r => {
    const card = document.createElement("div");
    card.className = "recipe-card" + (r.id === selectedRecipe.id ? " selected" : "");
    card.innerHTML = `<div class="check">✓</div>
      <div class="recipe-name">${r.name[lang]}</div>
      <div class="recipe-tag">${r.tag[lang]}</div>
      <div class="recipe-meta">${r.metaDesc[lang]}</div>`;
    card.onclick = () => { selectedRecipe = r; renderRecipes(); renderSliders(); calculate(); renderFermentGuide(); };
    grid.appendChild(card);
  });
}

// ─── Dynamic sliders ──────────────────────────────────────────────────────
function renderSliders() {
  const list = document.getElementById("slider-list");
  list.innerHTML = "";
  selectedRecipe.sliders.forEach(sc => {
    const defVal = ingDefault(sc.ingKey);
    const row = document.createElement("div");
    row.className = "slider-row";
    row.innerHTML = `
      <div class="slider-header">
        <span class="slider-label">${t(sc.labelKey)}</span>
        <div class="slider-value-wrap">
          <span class="slider-value" id="val-${sc.ingKey}"></span>
          <button class="slider-reset" onclick="resetSlider('${sc.ingKey}')">${t("btn_reset")}</button>
        </div>
      </div>
      <input type="range" id="sl-${sc.ingKey}"
             min="${sc.min}" max="${sc.max}" step="${sc.step}" value="${defVal}"
             oninput="onSlider('${sc.ingKey}')" />
      <div class="slider-range-labels"><span>${sc.min}%</span><span>${sc.max}%</span></div>`;
    list.appendChild(row);
    syncSliderTrack(sc.ingKey);
    syncSliderValue(sc.ingKey, sc.decimals);
  });
}

function ingDefault(ingKey) {
  const ing = selectedRecipe.ingredients.find(i => i.key === ingKey);
  return ing ? ing.pct : 0;
}

function sliderCfg(ingKey) {
  return selectedRecipe.sliders.find(s => s.ingKey === ingKey);
}

function getSliderVal(ingKey) {
  const el = document.getElementById("sl-" + ingKey);
  return el ? parseFloat(el.value) : ingDefault(ingKey);
}

function onSlider(ingKey) {
  const sc = sliderCfg(ingKey);
  syncSliderTrack(ingKey);
  syncSliderValue(ingKey, sc?.decimals ?? 1);
  calculate();
}

function resetSlider(ingKey) {
  const el = document.getElementById("sl-" + ingKey);
  if (!el) return;
  el.value = ingDefault(ingKey);
  onSlider(ingKey);
}

function syncSliderTrack(ingKey) {
  const el = document.getElementById("sl-" + ingKey);
  if (!el) return;
  const pct = ((parseFloat(el.value) - parseFloat(el.min)) / (parseFloat(el.max) - parseFloat(el.min))) * 100;
  el.style.setProperty("--fill", pct + "%");
}

function syncSliderValue(ingKey, decimals) {
  const el = document.getElementById("sl-" + ingKey);
  const val = el ? parseFloat(el.value) : ingDefault(ingKey);
  const d = decimals ?? (val < 1 ? 2 : 1);
  const display = document.getElementById("val-" + ingKey);
  if (display) display.textContent = val.toFixed(d) + "%";
}

// ─── Fermentation controls ────────────────────────────────────────────────
function onFermentSlider() {
  fermentHours = parseInt(document.getElementById("sl-ferment-hours").value);
  document.getElementById("val-ferment-hours").textContent = fermentHours + " h";
  const el = document.getElementById("sl-ferment-hours");
  const pct = ((fermentHours - 4) / (120 - 4)) * 100;
  el.style.setProperty("--fill", pct + "%");
  // heat-scale: cold ferment uses cold-blue, long ferments warm up
  const fillColor = fermentCold
    ? (fermentHours <= 24 ? "var(--heat-cold)" : fermentHours <= 48 ? "var(--heat-cool)" : "var(--basil-500)")
    : "var(--heat-ember)";
  el.style.setProperty("--fill-color", fillColor);
  renderFermentGuide();
}

function setFermentMethod(method) {
  fermentCold = method === "cold";
  document.getElementById("btn-cold").classList.toggle("active", fermentCold);
  document.getElementById("btn-room").classList.toggle("active", !fermentCold);
  onFermentSlider();
}

function renderFermentGuide() {
  const grid = document.getElementById("ferment-guide-grid");
  grid.innerHTML = selectedRecipe.fermentation.map(f => {
    const active = Math.abs(f.hours - fermentHours) <= 12 && f.cold === fermentCold;
    return `<div class="ferment-card${active ? " active" : ""}">
      <div class="ferment-time">${f.time[lang]}</div>
      <div class="ferment-desc">${f.desc[lang]}</div>
    </div>`;
  }).join("");
}

// ─── Calculate ───────────────────────────────────────────────────────────
const NUTR = {
  flour: { kcal: 3.55, protein: 0.12, carbs: 0.72, fat: 0.015 },
  oil:   { kcal: 8.84, protein: 0,    carbs: 0,    fat: 1.0 },
  sugar: { kcal: 3.87, protein: 0,    carbs: 1.0,  fat: 0 },
  water: { kcal: 0, protein: 0, carbs: 0, fat: 0 },
  zero:  { kcal: 0, protein: 0, carbs: 0, fat: 0 },
};

function calculate() {
  const balls  = Math.max(1, parseInt(document.getElementById("balls").value)  || 1);
  const weight = Math.max(50, parseInt(document.getElementById("weight").value) || 280);
  const r = selectedRecipe;
  const totalDough = balls * weight;

  const effectivePct = {};
  r.ingredients.forEach(ing => {
    effectivePct[ing.key] = r.sliders?.find(s => s.ingKey === ing.key)
      ? getSliderVal(ing.key)
      : ing.pct;
  });

  const sumPct = Object.values(effectivePct).reduce((a, v) => a + v, 0);
  const flourGrams = totalDough / (sumPct / 100);

  // Ingredients
  const list = document.getElementById("ingredient-list");
  list.innerHTML = "";
  let nutrKcal = 0, nutrProtein = 0, nutrCarbs = 0, nutrFat = 0;

  r.ingredients.forEach(ing => {
    const pct = effectivePct[ing.key];
    const grams = flourGrams * (pct / 100);
    const nf = NUTR[ing.nutrition ?? "zero"];
    nutrKcal    += grams * nf.kcal;
    nutrProtein += grams * nf.protein;
    nutrCarbs   += grams * nf.carbs;
    nutrFat     += grams * nf.fat;

    const row = document.createElement("div");
    row.className = "ingredient-row" + (ing.optional ? " optional" : "");
    row.innerHTML = `
      <div class="ing-name">${ing[lang]}${ing.optional ? `<span class="optional-badge">${t("badge_optional")}</span>` : ""}</div>
      <div class="ing-pct">${pct.toFixed(pct < 1 ? 2 : 1)}%</div>
      <div class="ing-amount">${fmt(grams)}</div>
      <div class="ing-unit">${t("unit_g")}</div>`;
    list.appendChild(row);
  });

  document.getElementById("total-weight").textContent = `${fmt(totalDough)} ${t("unit_g")}`;

  const src = r.source;
  document.getElementById("source-link").innerHTML = src
    ? `${t("source_prefix")} <a href="${src.url}" target="_blank" rel="noopener">${src.label}</a>`
    : "";

  // Nutrition (per single ball)
  const fac = 1 / balls;
  document.getElementById("nutrition-grid").innerHTML = `
    <div class="nutrition-card"><div class="nutrition-value">${Math.round(nutrKcal * fac)}</div><div class="nutrition-label">${t("nutr_calories")} ${t("unit_kcal")}</div></div>
    <div class="nutrition-card"><div class="nutrition-value">${Math.round(nutrProtein * fac)}&thinsp;g</div><div class="nutrition-label">${t("nutr_protein")}</div></div>
    <div class="nutrition-card"><div class="nutrition-value">${Math.round(nutrCarbs * fac)}&thinsp;g</div><div class="nutrition-label">${t("nutr_carbs")}</div></div>
    <div class="nutrition-card"><div class="nutrition-value">${Math.round(nutrFat * fac)}&thinsp;g</div><div class="nutrition-label">${t("nutr_fat")}</div></div>`;
}

function fmt(n) { return n < 10 ? n.toFixed(1) : Math.round(n).toString(); }

function adj(field, delta) {
  const el = document.getElementById(field);
  el.value = Math.min(+el.max, Math.max(+el.min, (+el.value || 0) + delta));
  calculate();
}

// ─── Config: localStorage ─────────────────────────────────────────────────
function loadConfigs() {
  try { return JSON.parse(localStorage.getItem(CONFIGS_KEY)) || []; } catch { return []; }
}
function persistConfigs(list) { localStorage.setItem(CONFIGS_KEY, JSON.stringify(list)); }

function saveConfig() {
  const nameEl = document.getElementById("config-name-input");
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }

  const overrides = {};
  selectedRecipe.sliders?.forEach(sc => { overrides[sc.ingKey] = getSliderVal(sc.ingKey); });

  const cfg = {
    id: uid(),
    name,
    recipeId: selectedRecipe.id,
    createdAt: new Date().toISOString(),
    balls: parseInt(document.getElementById("balls").value),
    ballWeightG: parseInt(document.getElementById("weight").value),
    overrides,
    fermentation: { hours: fermentHours, cold: fermentCold },
    bakedAt: null, rating: null, notes: "",
  };

  const list = loadConfigs();
  list.unshift(cfg);
  persistConfigs(list);
  nameEl.value = "";
  renderConfigs();
}

function loadConfig(id) {
  const cfg = loadConfigs().find(c => c.id === id);
  if (!cfg) return;

  const recipe = RECIPES.find(r => r.id === cfg.recipeId);
  if (!recipe) return;
  selectedRecipe = recipe;
  renderRecipes();
  renderSliders();

  document.getElementById("balls").value  = cfg.balls;
  document.getElementById("weight").value = cfg.ballWeightG;
  fermentHours = cfg.fermentation?.hours ?? 72;
  fermentCold  = cfg.fermentation?.cold  ?? true;
  document.getElementById("sl-ferment-hours").value = fermentHours;
  onFermentSlider();
  document.getElementById("btn-cold").classList.toggle("active", fermentCold);
  document.getElementById("btn-room").classList.toggle("active", !fermentCold);

  if (cfg.overrides) {
    Object.entries(cfg.overrides).forEach(([key, val]) => {
      const el = document.getElementById("sl-" + key);
      if (el) { el.value = val; onSlider(key); }
    });
  }
  calculate();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function deleteConfig(id) {
  if (!confirm(lang === "de" ? "Config löschen?" : "Delete config?")) return;
  persistConfigs(loadConfigs().filter(c => c.id !== id));
  renderConfigs();
}

function renderConfigs() {
  const list = loadConfigs();
  const el = document.getElementById("config-list");
  if (!list.length) {
    el.innerHTML = `<div class="config-empty">${t("config_empty")}</div>`;
    return;
  }
  el.innerHTML = `<div class="config-list">${list.map(cfg => {
    const recipe = RECIPES.find(r => r.id === cfg.recipeId);
    const recipeName = recipe ? recipe.name[lang] : cfg.recipeId;
    const date = new Date(cfg.createdAt).toLocaleDateString(lang === "de" ? "de-DE" : "en-GB");
    const hydration = cfg.overrides?.water ? cfg.overrides.water.toFixed(1) + "%" : "—";
    const fermentLabel = cfg.fermentation ? `${cfg.fermentation.hours} h ${cfg.fermentation.cold ? (lang === "de" ? "kalt" : "cold") : (lang === "de" ? "RT" : "RT")}` : "";
    const bakedLine = cfg.bakedAt
      ? `<span class="config-baked">${t("config_baked_on")} ${new Date(cfg.bakedAt).toLocaleDateString(lang === "de" ? "de-DE" : "en-GB")}</span>`
      : "";
    const stars = cfg.rating
      ? `<span class="config-stars">${starsStr(cfg.rating.overall)}</span>`
      : `<span class="config-unrated">${t("config_unrated")}</span>`;
    return `<div class="config-card">
      <div class="config-card-header">
        <span class="config-name">${esc(cfg.name)}</span>
        <span class="config-recipe-tag">${recipeName}</span>
      </div>
      <div class="config-meta">${cfg.balls} × ${cfg.ballWeightG} g · ${hydration} · ${fermentLabel}</div>
      <div class="config-meta">${date}</div>
      <div class="config-rating-row">${stars}${bakedLine}</div>
      <div class="config-actions">
        <button class="btn-sm" onclick="loadConfig('${cfg.id}')">${t("btn_load")}</button>
        <button class="btn-sm" onclick="openRating('${cfg.id}')">${t("btn_rate")}</button>
        <button class="btn-sm danger" onclick="deleteConfig('${cfg.id}')">${t("btn_delete")}</button>
      </div>
    </div>`;
  }).join("")}</div>`;
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function starsStr(n) { return "★".repeat(Math.round(n || 0)) + "☆".repeat(5 - Math.round(n || 0)); }

// ─── Rating modal ────────────────────────────────────────────────────────
const DIMS = ["ovenSpring","bottomColor","spotting","crumbStructure","crustTexture","flavorComplexity","overall"];
function dimLabel(key) {
  if (key === "spotting") return t(selectedRecipe.leoparding ? "dim_spotting_neo" : "dim_spotting_other");
  return t("dim_" + key.replace(/([A-Z])/g, c => "_" + c.toLowerCase()));
}

function openRating(id) {
  ratingConfigId = id;
  const cfg = loadConfigs().find(c => c.id === id);
  if (!cfg) return;
  const recipe = RECIPES.find(r => r.id === cfg.recipeId) || selectedRecipe;

  document.querySelector("[data-i18n='modal_rate_title']").textContent = cfg.name;
  document.getElementById("rating-date").value = cfg.bakedAt ? cfg.bakedAt.slice(0,10) : new Date().toISOString().slice(0,10);
  document.getElementById("rating-notes").value = cfg.notes || "";
  ratingValues = cfg.rating ? { ...cfg.rating } : {};

  const container = document.getElementById("rating-dimensions");
  container.innerHTML = DIMS.map(key => {
    const label = key === "spotting"
      ? t(recipe.leoparding ? "dim_spotting_neo" : "dim_spotting_other")
      : t("dim_" + key.replace(/([A-Z])/g, c => "_" + c.toLowerCase()));
    const cur = ratingValues[key] || 0;
    const stars = Array.from({length:5},(_,i) =>
      `<button class="star-btn${i < cur ? " filled" : ""}" onclick="setStar('${key}',${i+1})">★</button>`
    ).join("");
    return `<div class="dim-row"><span class="dim-label">${label}</span><div class="star-group" id="stars-${key}">${stars}</div></div>`;
  }).join("");

  document.getElementById("rating-modal").hidden = false;
}

function closeRating() {
  document.getElementById("rating-modal").hidden = true;
  ratingConfigId = null;
}

function setStar(dim, val) {
  ratingValues[dim] = val;
  const group = document.getElementById("stars-" + dim);
  group.querySelectorAll(".star-btn").forEach((btn, i) => {
    btn.classList.toggle("filled", i < val);
  });
}

function saveRating() {
  if (!ratingConfigId) return;
  const list = loadConfigs();
  const idx = list.findIndex(c => c.id === ratingConfigId);
  if (idx === -1) return;
  list[idx].bakedAt = document.getElementById("rating-date").value || new Date().toISOString().slice(0,10);
  list[idx].notes   = document.getElementById("rating-notes").value;
  list[idx].rating  = { ...ratingValues };
  persistConfigs(list);
  closeRating();
  renderConfigs();
}

document.getElementById("rating-modal").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeRating();
});

// ─── Init ─────────────────────────────────────────────────────────────────
renderRecipes();
renderSliders();
onFermentSlider();
calculate();
renderFermentGuide();
renderConfigs();
document.querySelectorAll("[data-i18n]").forEach(el => el.textContent = t(el.dataset.i18n));
document.querySelectorAll("[data-i18n-ph]").forEach(el => el.placeholder = t(el.dataset.i18nPh));
</script>
